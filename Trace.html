<style>
:root {
  --maxw: 1440px;
  --pad: clamp(20px, 4vw, 64px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #0a0d14; color: #e8ebf2; font-family: "Inter Tight", -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
body { overflow-x: hidden; }
a { color: inherit; text-decoration: none; cursor: pointer; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
.container { max-width: var(--maxw); margin: 0 auto; padding-left: var(--pad); padding-right: var(--pad); }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

/* ——— Mobile (<=768px) ——— */
.m-only { display: none; }
@media (max-width: 768px) {
  :root { --pad: 18px; }
  .m-only { display: block !important; }
  .m-hide { display: none !important; }

  /* Collapse inline grids */
  section [style*="gridTemplateColumns"],
  header [style*="gridTemplateColumns"],
  footer [style*="gridTemplateColumns"],
  div [style*="gridTemplateColumns"] { grid-template-columns: 1fr !important; gap: 18px !important; }

  /* Exceptions: keep 2-col grids for compact metric bands */
  .m-grid-2 { grid-template-columns: repeat(2, 1fr) !important; gap: 0 !important; }

  /* Scale display type */
  [style*="clamp(56px, 7.5vw, 120px)"] { font-size: 48px !important; line-height: 0.98 !important; }
  [style*="clamp(60px, 8vw, 128px)"] { font-size: 52px !important; line-height: 0.98 !important; }
  [style*="clamp(42px, 5.5vw, 80px)"],
  [style*="clamp(42px, 5.5vw, 76px)"],
  [style*="clamp(42px, 5vw, 72px)"] { font-size: 34px !important; line-height: 1.02 !important; }
  [style*="clamp(36px, 4vw, 56px)"] { font-size: 28px !important; line-height: 1.05 !important; }

  section { padding-top: 56px !important; padding-bottom: 56px !important; }

  /* Masthead */
  .mast-nav, .mast-eyebrow, .mast-live, .mast-cta { display: none !important; }
  .mast-burger { display: inline-flex !important; }

  /* Hero top slug editorial strip — simplify */
  .hero-slug > span:nth-child(2),
  .hero-slug > span:nth-child(3) { display: none !important; }

  /* Body text */
  p { font-size: 15.5px !important; line-height: 1.55 !important; }
  h1, h2 { letter-spacing: -0.02em !important; }
}
</style>

/* ===== Wordmark (shared with Semperr) ===== */
function Wordmark({ size = 28, tone = "ink", asMark = false }) {
  const color = tone === "ink" ? "#0b1220" : "#f8f6f0";
  const gold = "#c9a961";
  if (asMark) {
    return (
      <svg width={size} height={size} viewBox="0 0 48 48" style={{display:'block'}}>
        <text x="24" y="36" textAnchor="middle"
          fontFamily="Instrument Serif, serif" fontSize="42" fill={color} letterSpacing="-2">
          r<tspan fill={gold}>r</tspan>
        </text>
      </svg>
    );
  }
  return (
    <span style={{
      fontFamily:'Instrument Serif, serif',
      fontSize:size, color, letterSpacing:'-0.02em',
      fontWeight:400, lineHeight:1, whiteSpace:'nowrap', display:'inline-block',
    }}>
      Sempe<span style={{color: gold}}>rr</span>
    </span>
  );
}
window.Wordmark = Wordmark;

function SyntaxQuery({ clauses, chars }) {
  const colors = {
    verb:'#a6acbc', filter:'#c9a961', sector:'#4a7a5c', type:'#8ab4e8', rel:'#6b7388',
    action:'#b8502a', buyer:'#8ab4e8', window:'#c9a961', subject:'#8ab4e8',
  };
  let used = 0;
  return (
    <>{clauses.map((c, i) => {
      const start = used;
      const end = used + c.t.length;
      used = end;
      if (chars <= start) return null;
      const visible = c.t.slice(0, Math.max(0, chars - start));
      return (
        <span key={i} style={{color: colors[c.type] || '#e8ebf2'}}>{visible}</span>
      );
    })}</>
  );
}

                <div key={si} style={{
                  background:`rgba(74,127,193, ${0.1 + v * 0.8})`,

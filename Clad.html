<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Clad — Intelligence for the serious practice.</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>

<style>
/* ————— Clad local tokens (paper / steel) ————— */
:root {
  --ink: #0b1220;
  --ink-soft: #141c2e;
  --ink-line: #1e2640;
  --paper: #f8f6f0;
  --paper-warm: #efeadb;
  --paper-line: #e4dfcf;
  --paper-rule: #d7d0bc;
  --steel: #4a7fc1;
  --steel-deep: #2f5c96;
  --steel-ink: #1a3a66;
  --gold: #c9a961;
  --gold-deep: #a68846;
  --rust: #b8502a;
  --green: #4a7a5c;
  --muted-paper: #7a7466;

  --serif: "Instrument Serif", "Times New Roman", serif;
  --sans: "Inter Tight", -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Consolas, monospace;
}
html, body { background: var(--paper); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }

/* Keyframes for the animated exhibit */
@keyframes cladFade   { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes cladPass   { 0% { stroke-dashoffset: 40; } 100% { stroke-dashoffset: 0; } }
@keyframes cladBlink  { 0%,55%,100% { opacity: 1; } 60%,75% { opacity: 0.25; } }
@keyframes cladTick   { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes cladPulse  { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
@keyframes cladMargin { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: none; } }
@keyframes cladScan   { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

/* Page-local utilities */
.clad-hair { border-top: 1px solid var(--paper-line); }
.clad-rule { border-top: 2px solid var(--ink); }
.clad-sub  { border-top: 1px solid var(--paper-rule); }
.clad-chip-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--steel); margin-right:8px; vertical-align:middle; }

/* Masthead extras (uses shared .mast-* classes from styles.css for mobile) */
.clad-mast { position: sticky; top: 0; z-index: 50; background: rgba(248,246,240,0.82); backdrop-filter: saturate(140%) blur(10px); -webkit-backdrop-filter: saturate(140%) blur(10px); border-bottom: 1px solid var(--paper-line); }

/* Tablet breakpoint: loosen dense grids before full mobile collapse */
@media (max-width: 1100px) {
  .clad-two   { grid-template-columns: 1fr !important; gap: 40px !important; }
  .clad-four  { grid-template-columns: repeat(2, 1fr) !important; }
  .clad-six   { grid-template-columns: repeat(3, 1fr) !important; }
}

/* Clad mobile overrides — inherits from styles.css global @media block */
@media (max-width: 768px) {
  .clad-four { grid-template-columns: 1fr !important; }
  .clad-six  { grid-template-columns: 1fr 1fr !important; }
  .clad-mast { padding: 0 !important; }
  .clad-hero-figure { display: none !important; }
}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

/* ===== Wordmark (shared) ===== */
function Wordmark({ size = 26, tone = "ink", asMark = false }) {
  const color = tone === "ink" ? "#0b1220" : "#f8f6f0";
  const gold = "#c9a961";
  if (asMark) {
    return (
      <svg width={size} height={size} viewBox="0 0 48 48" style={{display:'block'}}>
        <text x="24" y="36" textAnchor="middle" fontFamily="Instrument Serif, serif" fontSize="42" fill={color} letterSpacing="-2">
          r<tspan fill={gold}>r</tspan>
        </text>
      </svg>
    );
  }
  return (
    <div style={{display:'flex', alignItems:'baseline', gap:0, fontFamily:'Instrument Serif, serif', color, letterSpacing:'-0.02em', fontSize:size, lineHeight:1}}>
      <span>Sempe</span><span style={{color:gold}}>rr</span>
    </div>
  );
}

/* ===== Masthead ===== */
function Masthead() {
  const [open, setOpen] = useState(false);
  return (
    <header className="clad-mast">
      <div className="container" style={{display:'grid', gridTemplateColumns:'1fr auto 1fr', alignItems:'center', height:64}}>
        <div style={{display:'flex', alignItems:'center', gap:18}}>
          <a href="index.html" className="h-eyebrow mast-eyebrow" style={{color:'#6b7388', fontSize:10}}>← Semperr</a>
          <span className="mast-eyebrow" style={{color:'#c9a961', fontSize:10, fontFamily:'JetBrains Mono, monospace', letterSpacing:'0.14em'}}>§ II</span>
        </div>
        <a href="index.html#clad" style={{display:'flex', alignItems:'baseline', gap:10, justifyContent:'center'}}>
          <span style={{fontFamily:'Instrument Serif, serif', fontSize:26, letterSpacing:'-0.02em', color:'#0b1220'}}>Clad</span>
          <span className="mast-eyebrow" style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, letterSpacing:'0.14em', color:'#7a7466', textTransform:'uppercase'}}>Intelligence for Law</span>
        </a>
        <nav className="mast-nav" style={{display:'flex', justifyContent:'flex-end', gap:28, fontFamily:'JetBrains Mono, monospace', fontSize:11, letterSpacing:'0.08em', textTransform:'uppercase', color:'#0b1220'}}>
          <a href="#dossier">Dossier</a>
          <a href="#citations">Citations</a>
          <a href="#drafting">Drafting</a>
          <a href="#discovery">Discovery</a>
          <a href="#pricing">Return</a>
          <a href="contact.html" className="mast-cta" style={{padding:'6px 14px', border:'1px solid #0b1220', borderRadius:999}}>Book a walk-through ↗</a>
        </nav>
        <button className="mast-burger" onClick={() => setOpen(v => !v)} style={{display:'none', position:'absolute', right:20, top:16, padding:10, border:'1px solid #0b1220', borderRadius:999, background:'transparent'}} aria-label="Menu">
          <span style={{display:'block', width:18, height:1, background:'#0b1220'}}/>
          <span style={{display:'block', width:18, height:1, background:'#0b1220', marginTop:5}}/>
        </button>
      </div>
      {open && (
        <div className="mast-panel m-only" style={{borderTop:'1px solid #e4dfcf', padding:'20px', display:'flex', flexDirection:'column', gap:14, fontFamily:'JetBrains Mono, monospace', fontSize:13, textTransform:'uppercase', letterSpacing:'0.1em'}}>
          <a href="#dossier" onClick={()=>setOpen(false)}>Dossier</a>
          <a href="#citations" onClick={()=>setOpen(false)}>Citations</a>
          <a href="#drafting" onClick={()=>setOpen(false)}>Drafting</a>
          <a href="#discovery" onClick={()=>setOpen(false)}>Discovery</a>
          <a href="#pricing" onClick={()=>setOpen(false)}>Return</a>
          <a href="contact.html" style={{color:'#a68846'}}>Book a walk-through ↗</a>
          <a href="index.html" style={{color:'#6b7388'}}>← Semperr</a>
        </div>
      )}
    </header>
  );
}

/* ===== Hero — animated auto-playing exhibit ===== */
function HeroDossier() {
  // 6-step loop: add case → verify → annotate → another case → brief update → quote
  const [step, setStep] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setStep(s => (s + 1) % 6), 2200);
    return () => clearInterval(id);
  }, []);

  return (
    <section style={{position:'relative', padding:'120px 0 96px', borderBottom:'1px solid var(--paper-line)'}}>
      <div className="grain"/>
      <div className="container">
        {/* slug row */}
        <div style={{display:'flex', gap:18, alignItems:'center', marginBottom:48, fontFamily:'JetBrains Mono, monospace', fontSize:11, textTransform:'uppercase', letterSpacing:'0.14em', color:'#7a7466'}}>
          <span>§ II &nbsp; Clad</span>
          <span style={{width:28, height:1, background:'#d7d0bc'}}/>
          <span style={{color:'#2f5c96'}}>Intelligence for the serious practice</span>
          <span style={{width:28, height:1, background:'#d7d0bc'}}/>
          <span>MMXXVI</span>
        </div>

        <div className="clad-two" style={{display:'grid', gridTemplateColumns:'1.1fr 1fr', gap:72, alignItems:'end', minHeight:540}}>
          {/* Left column — headline + lede */}
          <div>
            <h1 className="h-display" style={{fontSize:'clamp(56px, 7.6vw, 124px)', color:'#0b1220', maxWidth:780}}>
              The work of a<br/>
              twenty-lawyer firm,<br/>
              <span style={{fontStyle:'italic', color:'#2f5c96'}}>signed in your name.</span>
            </h1>
            <p style={{marginTop:36, fontFamily:'Instrument Serif, serif', fontSize:22, lineHeight:1.45, color:'#141c2e', maxWidth:560}}>
              Clad is the research, drafting, and discovery partner for boutique and
              midsize firms. Every citation verified. Every memo in your voice.
              Every exhibit ready to file.
            </p>
            <div style={{display:'flex', gap:14, marginTop:44, flexWrap:'wrap'}}>
              <a href="contact.html?kind=clad" style={{padding:'14px 22px', background:'#0b1220', color:'#f8f6f0', fontFamily:'JetBrains Mono, monospace', fontSize:12, letterSpacing:'0.08em', textTransform:'uppercase'}}>Request access ↗</a>
              <a href="#dossier" style={{padding:'14px 22px', border:'1px solid #0b1220', fontFamily:'JetBrains Mono, monospace', fontSize:12, letterSpacing:'0.08em', textTransform:'uppercase'}}>See a live exhibit</a>
            </div>
            <div style={{marginTop:56, display:'flex', gap:40, flexWrap:'wrap', fontFamily:'JetBrains Mono, monospace', fontSize:11, color:'#7a7466', letterSpacing:'0.08em'}}>
              <div><span style={{color:'#2f5c96'}}>◆</span> 184 firms · 42 states</div>
              <div><span style={{color:'#2f5c96'}}>◆</span> 1.2M citations verified this quarter</div>
              <div><span style={{color:'#2f5c96'}}>◆</span> SOC 2 Type II · privileged by default</div>
            </div>
          </div>

          {/* Right column — the animated exhibit */}
          <div className="clad-hero-figure" style={{position:'relative'}}>
            <DossierExhibit step={step}/>
          </div>

          {/* Mobile-only compact exhibit card */}
          <div className="m-only" style={{background:'#fbf9f2', border:'1px solid rgba(11,18,32,0.12)', padding:'24px 20px', marginTop:8}}>
            <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'#2f5c96', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:10}}>Exhibit · Dossier No. 04-217</div>
            <div style={{fontFamily:'Instrument Serif, serif', fontSize:22, lineHeight:1.25, color:'#0b1220'}}>Rowan &amp; Vale v. Midland Chemical</div>
            <div style={{marginTop:14, paddingTop:14, borderTop:'1px solid #e4dfcf', fontFamily:'Instrument Serif, serif', fontSize:15, color:'#141c2e', lineHeight:1.55}}>
              "Four partners, three associates, one Clad. We file against firms ten times our size and have not lost a motion this year."
            </div>
            <div style={{marginTop:10, fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'#7a7466', letterSpacing:'0.08em', textTransform:'uppercase'}}>— Managing Partner, Midwest litigation boutique</div>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ===== DossierExhibit — the live animated document ===== */
function DossierExhibit({ step }) {
  // Citations that fade in across steps
  const citations = [
    { n: '1', ref: 'Hadley v. Baxendale, 9 Ex. 341 (1854)',           note: 'consequential damages — reasonably contemplable', show: step >= 0 },
    { n: '2', ref: 'UCC § 2-715(2)(a)',                                note: 'buyer’s consequential damages',                    show: step >= 1 },
    { n: '3', ref: 'In re Midland Chem. Tr., 417 F.3d 112 (7th Cir.)', note: 'foreseeability standard in commercial supply',      show: step >= 3 },
    { n: '4', ref: 'Rowan Dep. 04/17/26, at 84:12–86:03',             note: 'admission re: delivery-window knowledge',           show: step >= 4 },
  ];

  return (
    <div style={{position:'relative', background:'#fbf9f2', border:'1px solid rgba(11,18,32,0.18)', boxShadow:'0 30px 60px -30px rgba(11,18,32,0.35), 0 8px 16px -8px rgba(11,18,32,0.18)', padding:'28px 32px 32px', minHeight:560}}>
      {/* Scanning bar — subtle indicator of "work being done" */}
      <div style={{position:'absolute', inset:0, overflow:'hidden', pointerEvents:'none'}}>
        <div style={{position:'absolute', left:0, right:0, height:140, background:'linear-gradient(180deg, rgba(74,127,193,0) 0%, rgba(74,127,193,0.06) 50%, rgba(74,127,193,0) 100%)', animation:'cladScan 6s linear infinite'}}/>
      </div>

      {/* Exhibit header */}
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', borderBottom:'2px solid #0b1220', paddingBottom:14, marginBottom:18}}>
        <div>
          <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'#2f5c96', letterSpacing:'0.14em', textTransform:'uppercase'}}>Exhibit · Dossier No. 04-217</div>
          <div style={{fontFamily:'Instrument Serif, serif', fontSize:26, color:'#0b1220', marginTop:6, letterSpacing:'-0.01em'}}>Rowan &amp; Vale v. Midland Chemical</div>
          <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'#7a7466', letterSpacing:'0.1em', marginTop:4}}>N.D. Ill. · Civil No. 26-CV-1184 · Breach / UCC 2</div>
        </div>
        <div style={{textAlign:'right', fontFamily:'JetBrains Mono, monospace', fontSize:9, color:'#7a7466', letterSpacing:'0.08em', textTransform:'uppercase'}}>
          <div>Prepared by</div>
          <div style={{color:'#0b1220', fontSize:10, marginTop:2}}>Clad · A. Morales, Esq.</div>
          <div style={{marginTop:6}}>Reviewed 04.18.26</div>
        </div>
      </div>

      {/* Issue block */}
      <div style={{marginBottom:18}}>
        <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'#7a7466', letterSpacing:'0.12em', textTransform:'uppercase'}}>Issue</div>
        <div style={{fontFamily:'Instrument Serif, serif', fontSize:16, color:'#141c2e', lineHeight:1.55, marginTop:6}}>
          Whether a 19-day delivery delay under an exclusive supply agreement,
          known by defendant to be time-sensitive, gives rise to consequential
          damages for lost downstream contracts.
        </div>
      </div>

      {/* Analysis with live-appearing citations */}
      <div style={{position:'relative'}}>
        <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'#7a7466', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:8}}>Analysis</div>
        <div style={{fontFamily:'Instrument Serif, serif', fontSize:15, color:'#141c2e', lineHeight:1.7}}>
          Under long-standing doctrine, a non-breaching party may recover
          consequential damages where the loss was <span style={{textDecoration:'underline', textDecorationColor:'#c9a961'}}>reasonably contemplable</span> at the
          time of contracting
          <Cite n="1" show={citations[0].show} />. The UCC codifies this standard for goods
          <Cite n="2" show={citations[1].show} />. The Seventh Circuit has applied it to
          commercial supply agreements where the supplier knew, or should have known,
          of the buyer's downstream obligations
          <Cite n="3" show={citations[2].show} />. Defendant's own deposition confirms
          knowledge of the April delivery window
          <Cite n="4" show={citations[3].show} />.
        </div>
      </div>

      {/* Margin annotation (drafts in during step 2) */}
      {step >= 2 && (
        <div style={{position:'absolute', right:-18, top:230, width:170, padding:'10px 12px', background:'#efeadb', border:'1px solid #d7d0bc', fontFamily:'JetBrains Mono, monospace', fontSize:10, lineHeight:1.5, color:'#141c2e', animation:'cladMargin 0.5s ease both'}}>
          <div style={{color:'#2f5c96', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:4}}>A. Morales · margin</div>
          Pair with Rowan Dep. 84:12 to show contemporaneous knowledge. Stronger than Hadley alone.
        </div>
      )}

      {/* Citation ledger at the bottom */}
      <div style={{marginTop:20, paddingTop:14, borderTop:'1px solid #d7d0bc'}}>
        <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'#7a7466', letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:8}}>Citations · verified</div>
        <div style={{display:'grid', gap:6}}>
          {citations.map((c, i) => (
            <div key={c.n} style={{display:'grid', gridTemplateColumns:'22px 1fr auto', gap:10, alignItems:'center', opacity: c.show ? 1 : 0.15, transition:'opacity 0.4s ease', fontSize:11}}>
              <span style={{fontFamily:'JetBrains Mono, monospace', color:'#7a7466'}}>[{c.n}]</span>
              <span style={{fontFamily:'Instrument Serif, serif', color:'#0b1220'}}>{c.ref}<span style={{color:'#7a7466', marginLeft:8, fontSize:10}}>— {c.note}</span></span>
              <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:9, color: c.show ? '#4a7a5c' : '#d7d0bc', letterSpacing:'0.1em'}}>
                {c.show ? '✓ BLUEBOOK OK' : '— PENDING'}
              </span>
            </div>
          ))}
        </div>
      </div>

      {/* Quote card — step 5 */}
      {step >= 5 && (
        <div style={{position:'absolute', left:-22, bottom:48, width:240, padding:'14px 16px', background:'#0b1220', color:'#f8f6f0', fontFamily:'Instrument Serif, serif', fontSize:13, fontStyle:'italic', lineHeight:1.5, animation:'cladFade 0.6s ease both', boxShadow:'0 14px 30px -14px rgba(11,18,32,0.45)'}}>
          "I reviewed the citations in seven minutes. A year ago this was a day's work."
          <div style={{marginTop:8, fontFamily:'JetBrains Mono, monospace', fontSize:9, fontStyle:'normal', color:'#c9a961', letterSpacing:'0.12em', textTransform:'uppercase'}}>— Partner, St. Louis</div>
        </div>
      )}
    </div>
  );
}

function Cite({ n, show }) {
  return (
    <sup style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color: show ? '#2f5c96' : '#d7d0bc', marginLeft:2, transition:'color 0.4s'}}>
      [{n}]{show && <span style={{color:'#4a7a5c', marginLeft:2}}>✓</span>}
    </sup>
  );
}

/* ===== Primitives — four-card row ===== */
function Primitives() {
  const items = [
    {
      n: '01', name: 'Dossier', tag: 'Matter → exhibit',
      body: 'Feed Clad a matter. Out comes a dossier: issue, analysis, verified citations, timeline of facts, key actors. In your house format.',
      href: '#dossier'
    },
    {
      n: '02', name: 'Citations', tag: 'Verified precedent',
      body: 'Semantic search across federal, state, and your internal work product. Every returned citation passes bluebook review before it reaches you.',
      href: '#citations'
    },
    {
      n: '03', name: 'Drafting', tag: 'Memo · brief · letter',
      body: 'Draft in your firm voice. Clad learns the house style from past filings and writes the first pass — partners edit, not author.',
      href: '#drafting'
    },
    {
      n: '04', name: 'Discovery', tag: 'Transcripts · productions',
      body: 'Ingest depositions, exhibits, document productions. Clad surfaces contradictions, hot docs, and gaps — with pin-cites to the page.',
      href: '#discovery'
    },
  ];
  return (
    <section style={{padding:'96px 0 88px', borderBottom:'1px solid var(--paper-line)', background:'var(--paper)'}}>
      <div className="container">
        <div style={{display:'flex', gap:18, alignItems:'baseline', marginBottom:48}}>
          <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:11, color:'#7a7466', letterSpacing:'0.14em', textTransform:'uppercase'}}>§ Primitives</span>
          <span style={{flex:1, height:1, background:'#d7d0bc'}}/>
          <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'#7a7466', letterSpacing:'0.1em', textTransform:'uppercase'}}>Four things, done well</span>
        </div>
        <h2 className="h-serif" style={{fontSize:'clamp(40px, 5vw, 72px)', color:'#0b1220', maxWidth:900, letterSpacing:'-0.015em'}}>
          Four disciplines. One <span style={{fontStyle:'italic', color:'#2f5c96'}}>ledger of record.</span>
        </h2>
        <div className="clad-four" style={{marginTop:56, display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:0, borderTop:'2px solid #0b1220', borderBottom:'2px solid #0b1220'}}>
          {items.map((it, i) => (
            <a key={it.n} href={it.href} style={{padding:'36px 28px 32px', borderRight: i < items.length - 1 ? '1px solid #d7d0bc' : 'none', display:'block'}}>
              <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:20}}>
                <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'#2f5c96', letterSpacing:'0.14em'}}>{it.n}</span>
                <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'#7a7466', letterSpacing:'0.1em', textTransform:'uppercase'}}>{it.tag}</span>
              </div>
              <div style={{fontFamily:'Instrument Serif, serif', fontSize:42, color:'#0b1220', letterSpacing:'-0.01em', lineHeight:1}}>{it.name}</div>
              <p style={{marginTop:20, fontSize:14, lineHeight:1.55, color:'#141c2e'}}>{it.body}</p>
              <div style={{marginTop:24, fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'#2f5c96', letterSpacing:'0.12em', textTransform:'uppercase'}}>See it ↓</div>
            </a>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ===== DossierLab — the full dossier build, walked through ===== */
function DossierLab() {
  const [idx, setIdx] = useState(0);
  const stages = [
    { key: 'intake', label: 'Intake', note: 'Upload pleadings, contracts, exhibits.' },
    { key: 'issues', label: 'Issues', note: 'Clad frames the questions the matter actually turns on.' },
    { key: 'auth',   label: 'Authority', note: 'Primary and persuasive authority, ranked by circuit.' },
    { key: 'facts',  label: 'Facts', note: 'A timeline in your voice — every fact pin-cited.' },
    { key: 'draft',  label: 'Draft', note: 'Memo, brief, or letter in house format. First pass only.' },
  ];
  useEffect(() => {
    const id = setInterval(() => setIdx(v => (v + 1) % stages.length), 2600);
    return () => clearInterval(id);
  }, []);

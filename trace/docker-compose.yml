services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGEME}
      POSTGRES_DB: trace
    volumes:
      - trace_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trace -d trace"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # No ports published by default. Only api reaches it.

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    read_only: false
    security_opt:
      - no-new-privileges:true

  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped

volumes:
  trace_pg:

{% extends "base.html" %}
{% block title %}Register · Trace{% endblock %}
{% block content %}
<div class="centered">
  <div class="auth-card">
    <div class="eyebrow">Trace // Invitation Required</div>
    <h1>Create account</h1>
    <p class="sub">An invite code is required to provision a new operator.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/register">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}"/>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email"/>
      </div>
      <div class="field">
        <label for="password">Password (min 12 chars)</label>
        <input id="password" name="password" type="password" required minlength="12" autocomplete="new-password"/>
      </div>
      <div class="field">
        <label for="invite_code">Invite code</label>
        <input id="invite_code" name="invite_code" type="text" required autocomplete="off"/>
      </div>
      <button class="btn gold" type="submit">Provision</button>
      <span class="note" style="margin-left:14px;">Have an account? <a href="/login" style="color:var(--accent);">Sign in</a></span>
    </form>
  </div>
</div>
{% endblock %}

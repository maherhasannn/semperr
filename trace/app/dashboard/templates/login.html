{% extends "base.html" %}
{% block title %}Sign in · Trace{% endblock %}
{% block content %}
<div class="centered">
  <div class="auth-card">
    <div class="eyebrow">Trace // Operator Console</div>
    <h1>Sign in</h1>
    <p class="sub">Credential-gated access. Sessions last 8 hours.</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="/trace/login">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}"/>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password"/>
      </div>
      <button class="btn" type="submit">Enter</button>
      <span class="note" style="margin-left:14px;">No account? <a href="/trace/register" style="color:var(--accent);">Register</a></span>
    </form>
  </div>
</div>
{% endblock %}

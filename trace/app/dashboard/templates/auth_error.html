{% extends "base.html" %}
{% block title %}Sign-in failed · Trace{% endblock %}
{% block content %}
<div class="centered">
  <div class="auth-card">
    <div class="eyebrow">Trace // Authentication</div>
    <h1>Sign-in failed</h1>
    <p class="sub">{{ message or "Your sign-in link could not be verified." }}</p>
    <p class="note">Magic links expire quickly and can be used only once.</p>
    <a class="btn gold" href="/invite">Try again</a>
  </div>
</div>
{% endblock %}

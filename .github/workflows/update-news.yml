name: Update News Feed

on:
  schedule:
    # Every 2 hours on the hour (UTC). 12 runs/day.
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout news-data branch
        uses: actions/checkout@v4
        with:
          ref: news-data
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch the file list needed so we can read the existing archive
          # (data/news.json) and merge new articles into it.
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch latest scripts and data from main
        run: |
          mkdir -p scripts data
          for f in scripts/aggregate-news.js scripts/rotate-quote.js data/quotes.json; do
            curl -fsSL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://raw.githubusercontent.com/${{ github.repository }}/main/$f" \
              -o "$f"
          done

      - name: Aggregate news from newsdata.io
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: node scripts/aggregate-news.js

      - name: Rotate daily quote
        run: node scripts/rotate-quote.js

      - name: Commit and force push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/news.json data/daily-quote.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit --amend -m "Update news feed + daily quote - $(date -u +'%Y-%m-%d %H:%M UTC')" \
            || git commit -m "Update news feed + daily quote - $(date -u +'%Y-%m-%d %H:%M UTC')"

          # Force push to keep the news-data branch at a single commit.
          git push --force origin news-data

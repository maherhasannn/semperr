<script type="text/babel">

/* ===== Animation Utilities ===== */

function useInView(ref, threshold = 0.15) {
  const [inView, setInView] = React.useState(false);
  React.useEffect(() => {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      setInView(true);
      return;
    }
    if (!ref.current) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setInView(true); obs.disconnect(); } },
      { threshold }
    );
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref, threshold]);
  return inView;
}

function RevealLine({ delay = 0, color = 'var(--gold)', height = 1, glow = false, style = {} }) {
  const ref = React.useRef(null);
  const inView = useInView(ref);
  return (
    <div ref={ref} style={{
      height,
      background: color,
      transform: inView ? 'scaleX(1)' : 'scaleX(0)',
      transformOrigin: 'left',
      transition: `transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) ${delay}s`,
      boxShadow: glow && inView ? `0 0 12px ${color}, 0 0 3px ${color}` : 'none',
      ...style,
    }} />
  );
}

function StaggerReveal({ children, stagger = 0.12, baseDelay = 0 }) {
  const ref = React.useRef(null);
  const inView = useInView(ref);
  return (
    <div ref={ref}>
      {React.Children.map(children, (child, i) => (
        <div style={{
          opacity: inView ? 1 : 0,
          transform: inView ? 'translateY(0)' : 'translateY(18px)',
          transition: `opacity 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) ${baseDelay + i * stagger}s, transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) ${baseDelay + i * stagger}s`,
        }}>
          {child}
        </div>
      ))}
    </div>
  );
}


/* ===== Visual Components ===== */

/* DataStream — ambient floating monospace characters for Hero */
function DataStream({ isDark }) {
  const chars = React.useMemo(() => {
    const symbols = ['0','1','\u00B7','\u2014','+','\u00A7','\u00B6','\u25B3','\u25CB','\u25AA',':','\u223F','0','1','\u2022','%','$','\u2013'];
    return Array.from({ length: 40 }, (_, i) => ({
      char: symbols[i % symbols.length],
      left: (i * 2.5 + Math.random() * 2) % 100,
      delay: Math.random() * 18,
      duration: 18 + Math.random() * 16,
      size: 10 + Math.random() * 3,
      opacity: 0.04 + Math.random() * 0.04,
    }));
  }, []);

  return (
    <div className="data-stream" style={{
      position:'absolute', inset:0, overflow:'hidden', pointerEvents:'none',
      maskImage:'linear-gradient(transparent 0%, black 15%, black 85%, transparent 100%)',
      WebkitMaskImage:'linear-gradient(transparent 0%, black 15%, black 85%, transparent 100%)',
    }}>
      {chars.map((c, i) => (
        <span key={i} style={{
          position:'absolute',
          left: `${c.left}%`,
          bottom: '-24px',
          fontFamily:'var(--mono)',
          fontSize: c.size,
          color: isDark ? '#f8f6f0' : '#0b1220',
          opacity: c.opacity,
          animation: `dataFloat ${c.duration}s linear ${c.delay}s infinite`,
          userSelect:'none',
        }}>{c.char}</span>
      ))}
    </div>
  );
}

/* AnimatedStat — counts up to target number on scroll */
function AnimatedStat({ text, inView, delay = 0 }) {
  const [display, setDisplay] = React.useState(text);
  const match = text.match(/^(.*?)(\d+)(.*?)$/);
  const prefersReduced = React.useMemo(
    () => typeof window !== 'undefined' && window.matchMedia('(prefers-reduced-motion: reduce)').matches,
    []
  );

  React.useEffect(() => {
    if (!inView || !match || prefersReduced) { setDisplay(text); return; }
    const target = parseInt(match[2]);
    const prefix = match[1];
    const suffix = match[3];
    const duration = 1400;
    let raf;
    let startTime = null;

    const tick = (now) => {
      if (!startTime) startTime = now;
      const elapsed = now - startTime - delay * 1000;
      if (elapsed < 0) { raf = requestAnimationFrame(tick); return; }
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      setDisplay(`${prefix}${Math.floor(eased * target)}${suffix}`);
      if (progress < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [inView]);

  return display;
}

/* TypedCommand — types out a terminal command on scroll */
function TypedCommand({ command, inView, delay = 0 }) {
  const [n, setN] = React.useState(0);
  const prefersReduced = React.useMemo(
    () => typeof window !== 'undefined' && window.matchMedia('(prefers-reduced-motion: reduce)').matches,
    []
  );

  React.useEffect(() => {
    if (prefersReduced) { setN(command.length); return; }
    if (!inView) return;
    let i = 0;
    let timeout;
    const startDelay = setTimeout(() => {
      const type = () => {
        i++;
        setN(i);
        if (i < command.length) timeout = setTimeout(type, 25 + Math.random() * 35);
      };
      type();
    }, delay * 1000);
    return () => { clearTimeout(startDelay); clearTimeout(timeout); };
  }, [inView, command, delay, prefersReduced]);

  return (
    <div className="typed-cmd" style={{
      fontFamily:'var(--mono)',
      fontSize:11,
      marginTop:16,
      opacity: inView ? 0.55 : 0,
      transition:'opacity 0.4s ease',
      whiteSpace:'nowrap',
      overflow:'hidden',
    }}>
      <span style={{color:'var(--gold)', opacity:0.6}}>$ </span>
      <span style={{color:'inherit'}}>{command.slice(0, n)}</span>
      {n < command.length && n > 0 && (
        <span style={{opacity:0.5, animation:'blink 0.8s step-end infinite'}}>{'\u258D'}</span>
      )}
    </div>
  );
}

/* NotarySeal — circular SVG stamp */

        <defs>
          <path id="sealArc" d="M 70,70 m -44,0 a 44,44 0 1,1 88,0 a 44,44 0 1,1 -88,0" />
        </defs>
        <text fontSize="7.5" fontFamily="var(--mono)" fill="var(--gold)" letterSpacing="4" style={{textTransform:'uppercase'}}>
          <textPath href="#sealArc" startOffset="2%">
            SEMPERR LABS {'\u00B7'} SAN FRANCISCO {'\u00B7'}
          </textPath>
        </text>
        <text x="70" y="78" textAnchor="middle" fontFamily="Instrument Serif, serif" fontSize="32" fill="var(--gold)" letterSpacing="-1">
          rr
        </text>
      </svg>
    </div>
  );
}

/* Constellation — subtle dot/line network for HiringSection */
function Constellation() {
  const nodes = React.useMemo(() => [
    {x:15, y:12}, {x:38, y:8}, {x:62, y:18}, {x:85, y:10},
    {x:25, y:35}, {x:50, y:42}, {x:72, y:32}, {x:92, y:38},
    {x:10, y:58}, {x:35, y:65}, {x:58, y:55}, {x:82, y:62},
    {x:20, y:82}, {x:48, y:78}, {x:70, y:85}, {x:90, y:75},
  ], []);

  const edges = React.useMemo(() => {
    const e = [];
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        if (Math.sqrt(dx*dx + dy*dy) < 28) e.push([i, j]);
      }
    }
    return e;
  }, [nodes]);

  return (
    <div className="constellation-wrap" style={{
      position:'absolute', inset:0, pointerEvents:'none', overflow:'hidden',
    }}>
      <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice" style={{
        width:'100%', height:'100%', position:'absolute', inset:0,
      }}>
        {edges.map(([a, b], i) => (
          <line key={i}
            x1={nodes[a].x} y1={nodes[a].y}
            x2={nodes[b].x} y2={nodes[b].y}
            stroke="var(--gold)" strokeWidth="0.15" opacity="0.2"
          />
        ))}
        {nodes.map((n, i) => (
          <g key={i} style={{
            animation: `constellationDrift ${6 + i * 0.5}s ease-in-out ${i * 0.3}s infinite`,
          }}>
            <circle
              cx={n.x} cy={n.y} r={0.8 + (i % 3) * 0.4}
              fill="var(--gold)"
              opacity="0.3"
              style={{
                animation: `constellationPulse ${3 + (i % 4) * 0.8}s ease-in-out ${i * 0.2}s infinite`,
              }}
            />
          </g>
        ))}
      </svg>
    </div>
  );
}

  return (
    <span style={{
      fontFamily:'Instrument Serif, serif',
      fontSize:size,

      lineHeight:1,
      whiteSpace:'nowrap',

    },
    {
      name: 'Mika Sato',
      role: 'Partner · Northpoint Advisors',
      quote: 'They built a custom reconciliation pipeline for our fund in three weeks. At our last shop, that request would have died in a backlog.',
      hair: '#0e0e10', skin: '#f0d0a8', shirt: '#b8502a',
    },
  ];

  const GRID = 18, CELL = 8;
  const portraitRaw = [
    '..................',
    '..................',
    '.......hhhhh......',
    '.....hhhhhhhhh....',
    '....hhsssssshh....',
    '....hssssssssh....',
    '....hsssssssss....',
    '....hssdssdsss....',
    '....hseeeseess....',
    '....hssssssss.....',
    '.....hsssssss.....',
    '.....hsscccss.....',
    '.....hssmmmss.....',
    '......hsssss......',
    '......sssss.......',
    '.....tttttttt.....',
    '....tttttttttt....',
    '...tttttttttttt...',
  ];
  const charMap = {'.':null,'s':'skin','h':'hair','t':'shirt','e':'eye','m':'mouth','c':'cheek','d':'shadow'};
  const grid = React.useMemo(() => portraitRaw.map(r => r.split('').map(ch => charMap[ch])), []);

  const [current, setCurrent] = React.useState(0);
  const [pixelColors, setPixelColors] = React.useState(null);
  const timerRef = React.useRef(null);

  const filledCells = React.useMemo(() => {
    const cells = [];
    grid.forEach((row, y) => row.forEach((cell, x) => {
      if (cell) cells.push({ x, y, cell });
    }));
    return cells;
  }, []);

  function getColors(t) {
    return {
      skin: t.skin, hair: t.hair, shirt: t.shirt,
      eye: '#1e1410', mouth: '#8a3a1f', cheek: '#e89579', shadow: '#c99874',
    };
  }

  React.useEffect(() => {
    const colors = getColors(testimonials[0]);
    const map = {};
    filledCells.forEach(({ x, y, cell }) => {
      map[x + ',' + y] = colors[cell] || colors.skin;
    });
    setPixelColors(map);
  }, []);

  React.useEffect(() => {
    if (!pixelColors) return;
    const t = testimonials[current];
    const newColors = getColors(t);
    const order = [...Array(filledCells.length).keys()];
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    const stagger = 12;
    const ids = [];
    order.forEach((idx, step) => {
      ids.push(setTimeout(() => {
        setPixelColors(prev => {
          const next = { ...prev };
          const c = filledCells[idx];
          next[c.x + ',' + c.y] = newColors[c.cell] || newColors.skin;
          return next;
        });
      }, step * stagger));
    });
    return () => ids.forEach(clearTimeout);
  }, [current]);

  React.useEffect(() => {
    timerRef.current = setInterval(() => {
      setCurrent(c => (c + 1) % testimonials.length);
    }, 5000);
    return () => clearInterval(timerRef.current);
  }, []);

  function goTo(i) {
    setCurrent(i);
    clearInterval(timerRef.current);
    timerRef.current = setInterval(() => {
      setCurrent(c => (c + 1) % testimonials.length);
    }, 5000);
  }

  const tData = testimonials[current];
  const quoteColor = isDark ? '#d4dbe8' : 'var(--ink)';
  const mutedColor = isDark ? '#6b7388' : 'var(--muted)';
  const nameColor = isDark ? '#f8f6f0' : 'var(--ink)';
  const lineColor = isDark ? 'rgba(255,255,255,0.08)' : 'var(--paper-line)';
  const pipInactive = isDark ? 'rgba(255,255,255,0.12)' : 'var(--paper-line)';

  return (
    <div className="hero-testimonial" style={{
      display:'flex', flexDirection:'column', alignItems:'center',
      paddingTop: 0,
    }}>
      <div style={{ position:'relative', marginBottom:20 }}>
        <div style={{
          position:'absolute', inset:-12,
          background: `radial-gradient(circle at 50% 55%, ${tData.shirt}33, transparent 65%)`,
          filter:'blur(10px)', transition:'background 0.8s',
        }}/>
        <svg width={GRID * CELL} height={GRID * CELL} style={{position:'relative', display:'block'}}>
          {pixelColors && filledCells.map(({ x, y }) => (
            <rect key={x+','+y}
              x={x * CELL} y={y * CELL}
              width={CELL + 0.4} height={CELL + 0.4}
              fill={pixelColors[x+','+y] || '#4a4852'}
              style={{ transition:'fill 0.4s ease' }}
            />
          ))}
          <g style={{opacity:0.12, pointerEvents:'none'}}>
            {[...Array(Math.floor(GRID * CELL / 3))].map((_, i) => (
              <rect key={i} x="0" y={i*3} width={GRID*CELL} height="1" fill="rgba(0,0,0,0.3)"/>
            ))}
          </g>
        </svg>
      </div>
      <div style={{
        position:'relative', maxWidth:320, textAlign:'center',
        marginBottom:14,
      }}>
        <span style={{
          fontFamily:'var(--serif)', fontSize:40, lineHeight:1,
          color:'var(--gold)', opacity:0.25,
          position:'absolute', top:-10, left:'50%', transform:'translateX(-50%)',
        }}>{'\u201C'}</span>
        <p style={{
          fontFamily:'var(--serif)', fontStyle:'italic',
          fontSize:15, lineHeight:1.45, color: quoteColor,
          letterSpacing:'-0.01em', minHeight:62,
        }}>{tData.quote}</p>
      </div>
      <div style={{
        textAlign:'center', paddingTop:12,
        borderTop:`1px solid ${lineColor}`, width:'100%', maxWidth:280,
      }}>
        <div style={{fontSize:13, fontWeight:500, color:nameColor}}>{tData.name}</div>
        <div style={{
          fontFamily:'var(--mono)', fontSize:9, letterSpacing:'0.12em',
          textTransform:'uppercase', color:mutedColor, marginTop:3,
        }}>{tData.role}</div>
      </div>
      <div style={{display:'flex', gap:6, marginTop:12}}>
        {testimonials.map((_, i) => (
          <span key={i} onClick={() => goTo(i)} style={{
            width:6, height:6, borderRadius:'50%', cursor:'pointer',
            background: i === current ? 'var(--gold)' : pipInactive,
            transition:'background 0.3s',
          }}/>
        ))}
      </div>
    </div>
  );
}

                    transition: `opacity 0.4s ease ${0.5 + i * 0.15 + j * 0.06}s, transform 0.4s ease ${0.5 + i * 0.15 + j * 0.06}s`,
                  }}>{tag}</span>
                ))}
              </div>
            </div>
            {i < capabilities.length - 1 && (
              <div style={{height:1, background: lineColor}} />
            )}
          </div>
        ))}
      </div>
    </section>
  );
}

window.CapabilitySection = CapabilitySection;


/* ===== components/HiringSection.jsx ===== */

function HiringSection({ theme = 'light' }) {
  const isDark = theme === 'dark';
  const ink = '#f8f6f0';
  const muted = '#9099ad';
  const gold = 'var(--gold)';

  const ref = React.useRef(null);
  const inView = useInView(ref);

  const words = ['quality', 'judgment', 'standards', 'rigor', 'craft'];
  const [wordIndex, setWordIndex] = React.useState(0);
  const [visible, setVisible] = React.useState(true);

  const prefersReduced = React.useMemo(
    () => typeof window !== 'undefined' && window.matchMedia('(prefers-reduced-motion: reduce)').matches,
    []
  );

  React.useEffect(() => {
    if (prefersReduced || !inView) return;
    const cycle = () => {
      setVisible(false);
      setTimeout(() => {
        setWordIndex(i => (i + 1) % words.length);
        setVisible(true);
      }, 300);
    };
    const id = setInterval(cycle, 1900);
    return () => clearInterval(id);
  }, [inView, prefersReduced]);

  return (
    <section id="careers" ref={ref} style={{
      background: isDark ? '#080d18' : 'var(--ink)', color:'#f8f6f0',
      padding:'120px 0 140px', position:'relative', overflow:'hidden',
    }}>
      <div className="grain" />
      <Constellation />

      <div className="container" style={{position:'relative', zIndex:1}}>
        <div style={{
          display:'grid', gridTemplateColumns:'1fr 1fr', gap:64, alignItems:'center',
        }}>
          {/* Left: copy */}
          <div>
            <div className="h-eyebrow" style={{
              color: gold, marginBottom:24,
              opacity: inView ? 1 : 0,
              transition: 'opacity 0.6s ease 0.1s',
            }}>
              IV. &nbsp; The team
            </div>

            <h2 className="h-display" style={{
              fontSize:'clamp(42px, 5.5vw, 80px)', color: ink, marginBottom:24,
              opacity: inView ? 1 : 0,
              transform: inView ? 'translateY(0)' : 'translateY(18px)',
              transition: 'opacity 0.6s ease 0.15s, transform 0.6s ease 0.15s',
            }}>
              We hire for<br/><em style={{fontStyle:'italic', color: gold}}>judgment.</em>
            </h2>

            <p style={{
              maxWidth:480, fontSize:18, lineHeight:1.55, color: muted, marginBottom:40,
              opacity: inView ? 1 : 0,
              transition: 'opacity 0.6s ease 0.3s',
            }}>
              Semperr is deliberately small. Every engineer, analyst, and designer is here
              because they refused to ship something they weren't proud of.
            </p>

            <div style={{
              opacity: inView ? 1 : 0,
              transition: 'opacity 0.6s ease 0.5s',
            }}>
              <a href="careers.html" style={{
                display:'inline-flex', alignItems:'center', gap:10,
                padding:'14px 22px', borderRadius:999,
                background:'#f8f6f0', color:'#0b1220', fontSize:14, fontWeight:500,
              }}>See open roles <span style={{opacity:0.5}}>↗</span></a>
            </div>
          </div>

          {/* Right: kinetic type zone — larger */}
          <div className="hiring-kinetic" style={{
            display:'flex', alignItems:'center', justifyContent:'center',
            minHeight:320,
            position:'relative',
          }}>
            {prefersReduced ? (
              <div style={{display:'flex', flexDirection:'column', gap:12, textAlign:'center'}}>
                {words.map(w => (
                  <span key={w} className="h-display" style={{
                    fontSize:'clamp(36px, 5vw, 72px)',
                    color: gold,
                    fontStyle:'italic',
                  }}>{w}</span>
                ))}
              </div>
            ) : (
              <span className="h-display" style={{
                fontSize:'clamp(56px, 7vw, 112px)',
                color: gold,
                fontStyle:'italic',
                opacity: visible && inView ? 1 : 0,
                transform: visible && inView ? 'translateY(0) scale(1)' : 'translateY(8px) scale(0.97)',
                transition: 'opacity 0.4s ease, transform 0.4s ease',
                textShadow: visible && inView ? '0 0 60px rgba(201,169,97,0.15)' : 'none',
              }}>
                {words[wordIndex]}
              </span>
            )}
          </div>
        </div>
      </div>
    </section>
  );
}

window.HiringSection = HiringSection;

/* ===== components/TweaksPanel.jsx ===== */

function TweaksPanel({ state, setState, visible }) {
  if (!visible) return null;

  const set = (k, v) => {
    setState(s => ({...s, [k]: v}));
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]: v}}, '*');
  };

  const Row = ({label, children}) => (
    <div style={{
      display:'grid', gridTemplateColumns:'86px 1fr', gap:12, alignItems:'center',
      padding:'10px 0', borderBottom:'1px solid rgba(11,18,32,0.06)',
    }}>
      <div style={{
        fontFamily:'JetBrains Mono, monospace', fontSize:10,
        letterSpacing:'0.08em', textTransform:'uppercase', color:'#6b7388',
      }}>{label}</div>
      <div>{children}</div>
    </div>
  );

  const Seg = ({value, onChange, opts}) => (
    <div style={{display:'flex', gap:4, flexWrap:'wrap'}}>
      {opts.map(o => (
        <button key={o.v} onClick={() => onChange(o.v)} style={{
          padding:'6px 10px', fontSize:11,
          border: `1px solid ${value === o.v ? '#0b1220' : 'rgba(11,18,32,0.15)'}`,
          background: value === o.v ? '#0b1220' : '#fff',
          color: value === o.v ? '#f8f6f0' : '#0b1220',
          cursor:'pointer', borderRadius:2,
          fontFamily:'JetBrains Mono, monospace', letterSpacing:'0.04em',
        }}>{o.l}</button>
      ))}
    </div>
  );

  return (
    <div style={{
      position:'fixed', bottom:20, right:20, zIndex:100,
      width:320,
      background:'#f8f6f0',
      border:'1px solid rgba(11,18,32,0.15)',
      boxShadow:'0 30px 60px -20px rgba(0,0,0,0.3)',
      borderRadius:4,
      overflow:'hidden',
      fontFamily:'Inter Tight, sans-serif',
    }}>
      <div style={{
        padding:'14px 16px',
        borderBottom:'1px solid rgba(11,18,32,0.1)',
        background:'#0b1220', color:'#f8f6f0',
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}>
        <span style={{fontFamily:'Instrument Serif, serif', fontSize:20}}>Tweaks</span>
        <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'#c9a961', letterSpacing:'0.1em'}}>SEMPERR</span>
      </div>
      <div style={{padding:'8px 16px 16px'}}>
        <Row label="Theme">
          <Seg value={state.theme} onChange={v => set('theme', v)}
            opts={[{v:'light', l:'Paper'}, {v:'dark', l:'Ink'}]}/>
        </Row>
        <Row label="Accent">
          <Seg value={state.accent} onChange={v => set('accent', v)}
            opts={[{v:'gold', l:'Gold'}, {v:'rust', l:'Rust'}, {v:'steel', l:'Steel'}]}/>
        </Row>
        <Row label="Type">
          <Seg value={state.type} onChange={v => set('type', v)}
            opts={[{v:'instrument', l:'Instrument'}, {v:'dmserif', l:'DM Serif'}, {v:'fraunces', l:'Fraunces'}]}/>
        </Row>
      </div>
    </div>
  );
}

window.TweaksPanel = TweaksPanel;


</script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "gold",
  "type": "instrument"
}/*EDITMODE-END*/;

function applyType(t) {
  const map = {
    instrument: '"Instrument Serif", "Times New Roman", serif',
    dmserif:    '"DM Serif Display", "Times New Roman", serif',
    fraunces:   '"Fraunces", "Times New Roman", serif',
  };
  document.documentElement.style.setProperty('--serif', map[t] || map.instrument);
}
function applyAccent(a) {
  const map = {
    gold:  { a:'#c9a961', d:'#a68846' },
    rust:  { a:'#b8502a', d:'#8a3a1f' },
    steel: { a:'#4a7fc1', d:'#2f5c96' },
  };
  const c = map[a] || map.gold;
  document.documentElement.style.setProperty('--gold', c.a);
  document.documentElement.style.setProperty('--gold-deep', c.d);
}

function App() {
  const [state, setState] = React.useState(TWEAK_DEFAULTS);
  const [tweaksOn, setTweaksOn] = React.useState(false);

  React.useEffect(() => {
    applyType(state.type);
    applyAccent(state.accent);
  }, [state.type, state.accent]);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOn(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const isDark = state.theme === 'dark';

  return (
    <div data-screen-label="Semperr Landing" style={{
      background: isDark ? 'var(--ink)' : 'var(--paper)',
      color: isDark ? 'var(--paper)' : 'var(--ink)',
      minHeight:'100vh',
    }}>
      <Masthead theme={state.theme}/>
      <Hero theme={state.theme}/>
      <SectionDivider color={isDark ? 'rgba(255,255,255,0.08)' : 'rgba(11,18,32,0.08)'} />
      <CharterSection theme={state.theme}/>
      <SectionDivider color="var(--gold)" />
      <ProofSection theme={state.theme}/>
      <SectionDivider color="var(--gold)" />
      <CapabilitySection theme={state.theme}/>
      <SectionDivider color={isDark ? 'rgba(255,255,255,0.08)' : 'rgba(11,18,32,0.08)'} />
      <HiringSection theme={state.theme}/>
      <Footer theme={state.theme}/>

      <TweaksPanel state={state} setState={setState} visible={tweaksOn}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

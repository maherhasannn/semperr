<style>
:root {
  --ink: #0b1220; --ink-soft: #141c2e; --ink-line: #1e2640;
  --paper: #f8f6f0; --paper-warm: #efeadb; --paper-line: #e4dfcf;
  --gold: #c9a961; --gold-deep: #a68846;
  --steel: #4a7fc1; --steel-deep: #2f5c96;
  --rust: #b8502a; --green: #4a7a5c;
  --muted: #6b7388; --muted-paper: #7a7466;
  --serif: "Instrument Serif", "Times New Roman", serif;
  --sans: "Inter Tight", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Consolas, monospace;
  --maxw: 1440px; --pad: clamp(20px, 4vw, 64px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--paper); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
body { overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
.h-display { font-family: var(--serif); font-weight: 400; letter-spacing: -0.02em; line-height: 0.95; }
.h-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; }
.h-serif { font-family: var(--serif); font-weight: 400; line-height: 1.02; letter-spacing: -0.015em; }
.t-body { font-size: 16px; line-height: 1.55; color: var(--muted-paper); }
.grain {
  position: absolute; inset: 0; pointer-events: none; opacity: 0.035; mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
}
.hair { border-top: 1px solid var(--paper-line); }
.container { max-width: var(--maxw); margin: 0 auto; padding-left: var(--pad); padding-right: var(--pad); }
@media (max-width: 1100px) {
  .dev-rig-grid { grid-template-columns: 1fr !important; }
}
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }

/* ——— Animations ——— */
@keyframes scanLine {
  0% { transform: translateY(0); }
  100% { transform: translateY(100%); }
}

/* ——— Reduced Motion ——— */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ——— Mobile (<=768px) ——— */
.m-only { display: none; }
@media (max-width: 768px) {
  :root { --pad: 20px; }
  .m-only { display: block !important; }
  .m-hide { display: none !important; }

  /* Collapse multi-column inline grids */
  section [style*="grid-template-columns"],
  footer [style*="grid-template-columns"] { grid-template-columns: 1fr !important; gap: 24px !important; }

  /* Scale down display typography */
  [style*="clamp(64px"], [style*="clamp(60px"] { font-size: 52px !important; line-height: 0.98 !important; }
  [style*="clamp(56px"] { font-size: 46px !important; line-height: 1 !important; }
  [style*="clamp(52px"] { font-size: 42px !important; line-height: 1.02 !important; }
  [style*="clamp(48px"] { font-size: 40px !important; }
  [style*="clamp(42px"] { font-size: 36px !important; }
  [style*="clamp(36px"] { font-size: 30px !important; }

  /* Hero padding */
  section { padding-top: 48px !important; padding-bottom: 56px !important; }

  /* Masthead */
  .mast-nav, .mast-eyebrow, .mast-signin { display: none !important; }
  .mast-burger { display: inline-flex !important; }
  .mast-panel { display: block; }

  /* Body text reflow */
  p { font-size: 16px !important; line-height: 1.55 !important; }

  /* Charter: roman numerals inline */
  .charter-value-numeral { display: inline !important; margin-right: 8px !important; }

  /* Hiring: kinetic zone below copy, smaller font */
  .hiring-kinetic { font-size: 48px !important; min-height: 80px !important; margin-top: 32px !important; }

  /* Footer columns stack */
  .footer-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>
<div id="root"></div>

<script type="text/babel">

/* ===== Animation Utilities ===== */

function useInView(ref, threshold = 0.15) {
  const [inView, setInView] = React.useState(false);
  React.useEffect(() => {
    // Respect prefers-reduced-motion: show everything immediately
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      setInView(true);
      return;
    }
    if (!ref.current) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setInView(true); obs.disconnect(); } },
      { threshold }
    );
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref, threshold]);
  return inView;
}

function RevealLine({ delay = 0, color = 'var(--gold)', height = 1, style = {} }) {
  const ref = React.useRef(null);
  const inView = useInView(ref);
  return (
    <div ref={ref} style={{
      height,
      background: color,
      transform: inView ? 'scaleX(1)' : 'scaleX(0)',
      transformOrigin: 'left',
      transition: `transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) ${delay}s`,
      ...style,
    }} />
  );
}

function StaggerReveal({ children, stagger = 0.12, baseDelay = 0 }) {
  const ref = React.useRef(null);
  const inView = useInView(ref);
  return (
    <div ref={ref}>
      {React.Children.map(children, (child, i) => (
        <div style={{
          opacity: inView ? 1 : 0,
          transform: inView ? 'translateY(0)' : 'translateY(18px)',
          transition: `opacity 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) ${baseDelay + i * stagger}s, transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) ${baseDelay + i * stagger}s`,
        }}>
          {child}
        </div>
      ))}
    </div>
  );
}


/* ===== components/Wordmark.jsx ===== */

function Wordmark({ size = 28, tone = "ink", asMark = false }) {
  const color = tone === "ink" ? "#0b1220" : "#f8f6f0";
  const gold = "#c9a961";

  if (asMark) {
    return (
      <svg width={size} height={size} viewBox="0 0 48 48" style={{display:'block'}}>
        <text x="24" y="36" textAnchor="middle"
          fontFamily="Instrument Serif, serif" fontSize="42" fill={color} letterSpacing="-2">
          r<tspan fill={gold}>r</tspan>
        </text>
      </svg>
    );
  }

  return (
    <span style={{
      fontFamily:'Instrument Serif, serif',
      fontSize:size,
      color,
      letterSpacing:'-0.02em',
      fontWeight:400,
      lineHeight:1,
      whiteSpace:'nowrap',
      display:'inline-block',
    }}>
      Sempe<span style={{color: gold}}>rr</span>
    </span>
  );
}

window.Wordmark = Wordmark;


/* ===== components/Masthead.jsx ===== */

function Masthead({ theme }) {
  const isDark = theme === 'dark';
  const [open, setOpen] = React.useState(false);
  const panelBg = isDark ? '#0b1220' : '#f8f6f0';
  const line = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(11,18,32,0.08)';
  return (
    <header style={{
      position:'sticky', top:0, zIndex:50,
      background: isDark ? 'rgba(11,18,32,0.78)' : 'rgba(248,246,240,0.78)',
      backdropFilter:'blur(14px) saturate(140%)',
      WebkitBackdropFilter:'blur(14px) saturate(140%)',
      borderBottom: `1px solid ${line}`,
    }}>
      <div className="container" style={{
        display:'flex', alignItems:'center', justifyContent:'space-between',
        height:64,
      }}>
        <div style={{display:'flex', alignItems:'center', gap:40}}>
          <Wordmark size={24} tone={isDark ? 'paper' : 'ink'} />
          <nav className="mast-nav" style={{display:'flex', gap:28, fontSize:13, color: isDark ? '#9099ad' : '#6b7388'}}>
            <a href="charter.html">Charter</a>
            <a href="#capabilities">Capabilities</a>
            <a href="#company">Company</a>
            <a href="#careers">Careers</a>
          </nav>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:20}}>
          <span className="h-eyebrow mast-eyebrow" style={{color: isDark ? '#c9a961' : '#a68846'}}>
            Est. MMXXI · NYC
          </span>
          <button className="mast-burger" onClick={() => setOpen(o => !o)} aria-label="Menu" style={{
            display:'none', alignItems:'center', justifyContent:'center',
            width:40, height:40,
            border:`1px solid ${isDark ? 'rgba(255,255,255,0.18)' : 'rgba(11,18,32,0.2)'}`,
            borderRadius:8, color: isDark ? '#f8f6f0' : '#0b1220',
          }}>
            <span style={{display:'grid', gap:4}}>
              <span style={{width:16, height:1.5, background:'currentColor', display:'block'}}/>
              <span style={{width:16, height:1.5, background:'currentColor', display:'block'}}/>
              <span style={{width:16, height:1.5, background:'currentColor', display:'block'}}/>
            </span>
          </button>
          <a href="contact.html" style={{
            fontSize:13,
            padding:'8px 16px',
            border:`1px solid ${isDark ? 'rgba(255,255,255,0.18)' : 'rgba(11,18,32,0.2)'}`,
            borderRadius:999,
            color: isDark ? '#f8f6f0' : '#0b1220',
          }}>Get in touch →</a>
        </div>
      </div>
      {open && (
        <div className="mast-panel m-only" style={{
          background: panelBg, borderTop:`1px solid ${line}`, padding:'16px 20px 24px',
        }}>
          <nav style={{display:'grid', gap:14, fontSize:16, color: isDark ? '#c7cdd9' : '#2a3246', fontFamily:'var(--serif)'}}>
            <a onClick={() => setOpen(false)} href="charter.html">Charter</a>
            <a onClick={() => setOpen(false)} href="#capabilities">Capabilities</a>
            <a onClick={() => setOpen(false)} href="#company">Company</a>
            <a onClick={() => setOpen(false)} href="#careers">Careers</a>
            <a onClick={() => setOpen(false)} href="contact.html" style={{color:'var(--gold)', marginTop:4}}>Get in touch →</a>
          </nav>
        </div>
      )}
    </header>
  );
}

window.Masthead = Masthead;


/* ===== components/Hero.jsx ===== */

function Hero({ theme = 'light' }) {
  const isDark = theme === 'dark';
  const ink = isDark ? '#f8f6f0' : '#0b1220';
  const muted = isDark ? '#9099ad' : '#6b7388';
  const gold = 'var(--gold)';

  const [revealed, setRevealed] = React.useState(false);
  React.useEffect(() => {
    const t = setTimeout(() => setRevealed(true), 100);
    return () => clearTimeout(t);
  }, []);

  // Reduced motion: show everything immediately
  const prefersReduced = React.useMemo(
    () => typeof window !== 'undefined' && window.matchMedia('(prefers-reduced-motion: reduce)').matches,
    []
  );
  const show = prefersReduced || revealed;

  const t = (delay) => prefersReduced ? {} : {
    opacity: show ? 1 : 0,
    transform: show ? 'translateY(0)' : 'translateY(18px)',
    transition: `opacity 0.6s cubic-bezier(0.25,0.46,0.45,0.94) ${delay}s, transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94) ${delay}s`,
  };

  return (
    <section style={{
      position:'relative',
      background: isDark ? 'var(--ink)' : 'var(--paper)',
      padding: '80px 0 96px',
      overflow:'hidden',
    }}>
      <div className="grain" />

      <div className="container">
        {/* Eyebrow */}
        <div className="h-eyebrow" style={{
          color: gold, marginBottom:32,
          ...t(0.1),
        }}>
          The interface for serious work
        </div>

        {/* Headline — three staggered lines */}
        <h1 className="h-display" style={{
          fontSize:'clamp(52px, 8vw, 132px)',
          color: ink,
        }}>
          <span style={{display:'block', ...t(0.2)}}>Custom systems,</span>
          <span style={{display:'block', ...t(0.35)}}>data <em style={{
            fontStyle:'italic',
            color: show ? 'var(--gold)' : (isDark ? '#6b7388' : '#9099ad'),
            transition: prefersReduced ? 'none' : 'color 0.6s cubic-bezier(0.25,0.46,0.45,0.94) 0.5s',
          }}>infrastructure,</em></span>
          <span style={{display:'block', ...t(0.5)}}>technical workflows.</span>
        </h1>

        {/* RevealLine under headline */}
        <div style={{marginTop:28, maxWidth:600}}>
          <RevealLine delay={0.6} color={gold} />
        </div>

        {/* Subhead */}
        <p style={{
          marginTop:32, maxWidth:620, fontSize:19, lineHeight:1.55,
          color: muted,
          ...t(0.8),
        }}>
          Semperr builds and operates the software that private-equity firms, law practices,
          and owner-run businesses depend on when the answer has to be right.
        </p>

        {/* CTAs */}
        <div style={{
          display:'flex', gap:12, marginTop:40,
          ...t(1.0),
        }}>
          <a href="charter.html" style={{
            display:'inline-flex', alignItems:'center', gap:10,
            padding:'14px 22px', borderRadius:999,
            background: ink, color: isDark ? '#0b1220' : '#f8f6f0',
            fontSize:14, fontWeight:500,
          }}>Read the charter <span style={{opacity:0.5}}>→</span></a>
          <a href="contact.html" style={{
            display:'inline-flex', alignItems:'center', gap:10,
            padding:'14px 22px', borderRadius:999,
            border: `1px solid ${isDark ? 'rgba(255,255,255,0.18)' : 'rgba(11,18,32,0.2)'}`,
            color: ink, fontSize:14, fontWeight:500,
          }}>Get in touch</a>
        </div>
      </div>
    </section>
  );
}

window.Hero = Hero;


/* ===== components/CharterSection.jsx ===== */

function CharterSection({ theme = 'light' }) {
  const isDark = theme === 'dark';
  const bg = isDark ? 'var(--ink-soft)' : 'var(--paper-warm)';
  const ink = isDark ? '#f8f6f0' : '#0b1220';
  const muted = isDark ? '#9099ad' : '#6b7388';
  const gold = 'var(--gold)';
  const lineColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(11,18,32,0.1)';

  const ref = React.useRef(null);
  const inView = useInView(ref);

  const values = [
    { num: 'I', name: 'Rigor', desc: 'Every figure traceable. Every source dated. Every derivation recoverable.' },
    { num: 'II', name: 'Discretion', desc: 'Client data is treated as testimony\u2009—\u2009never shared, never inferred, never sold.' },
    { num: 'III', name: 'Durability', desc: "We build for the decade, not the quarter. If it can\u2019t survive a regime change, it doesn\u2019t ship." },
    { num: 'IV', name: 'Clarity', desc: 'Plain language, honest timelines, no jargon designed to obscure.' },
    { num: 'V', name: 'Accountability', desc: 'A name on every deliverable. A partner on every engagement.' },
  ];

  return (
    <section id="charter" ref={ref} style={{
      background: bg, padding: '120px 0 140px', position:'relative', overflow:'hidden',
    }}>
      <div className="grain" />
      <div className="container">
        {/* Eyebrow */}
        <div className="h-eyebrow" style={{
          color: gold, marginBottom:24,
          opacity: inView ? 1 : 0,
          transition: 'opacity 0.6s ease 0.1s',
        }}>
          I. &nbsp; The Charter
        </div>

        {/* Headline */}
        <h2 className="h-display" style={{
          fontSize:'clamp(42px, 5.5vw, 80px)', color: ink, marginBottom:20,
          opacity: inView ? 1 : 0,
          transform: inView ? 'translateY(0)' : 'translateY(18px)',
          transition: 'opacity 0.6s ease 0.15s, transform 0.6s ease 0.15s',
        }}>
          Five principles. No exceptions.
        </h2>

        {/* Deck */}
        <p style={{
          maxWidth:620, fontSize:18, lineHeight:1.55, color: muted, marginBottom:56,
          opacity: inView ? 1 : 0,
          transition: 'opacity 0.6s ease 0.25s',
        }}>
          Every engagement, every hire, every line of code is measured against the same standard.
        </p>

        <RevealLine delay={0.3} color={lineColor} />

        {/* Values list with scan line */}
        <div style={{position:'relative'}}>
          {/* Scan line */}
          <div style={{
            position:'absolute', top:0, left:0, right:0, height:1,
            background: `linear-gradient(90deg, transparent, var(--gold), transparent)`,
            opacity: inView ? 0.6 : 0,
            animation: inView ? 'scanLine 2.5s ease-in-out 0.5s forwards' : 'none',
            pointerEvents: 'none',
            zIndex: 2,
          }} />

          {values.map((v, i) => (
            <div key={v.num} style={{
              display:'grid', gridTemplateColumns:'48px 160px 1fr', gap:24, alignItems:'baseline',
              padding:'28px 0',
              borderBottom: `1px solid ${lineColor}`,
              opacity: inView ? 1 : 0,
              transform: inView ? 'translateY(0)' : 'translateY(14px)',
              transition: `opacity 0.5s ease ${0.35 + i * 0.12}s, transform 0.5s ease ${0.35 + i * 0.12}s`,
            }}>
              <span className="charter-value-numeral h-eyebrow" style={{color: gold, fontSize:12}}>{v.num}</span>
              <span className="h-serif" style={{fontSize:24, color: ink}}>{v.name}</span>
              <span style={{fontSize:16, lineHeight:1.55, color: muted}}>{v.desc}</span>
            </div>
          ))}
        </div>

        {/* CTA */}
        <div style={{
          marginTop:48,
          opacity: inView ? 1 : 0,
          transition: 'opacity 0.6s ease 1s',
        }}>
          <a href="charter.html" style={{
            display:'inline-flex', alignItems:'center', gap:10,
            padding:'14px 22px', borderRadius:999,
            border: `1px solid ${isDark ? 'rgba(255,255,255,0.18)' : 'rgba(11,18,32,0.2)'}`,
            color: ink, fontSize:14, fontWeight:500,
          }}>Read the full charter <span style={{opacity:0.5}}>→</span></a>
        </div>
      </div>
    </section>
  );
}

window.CharterSection = CharterSection;


/* ===== components/ProofSection.jsx ===== */

function ProofSection({ theme = 'light' }) {
  const isDark = theme === 'dark';
  const ink = isDark ? '#f8f6f0' : '#f8f6f0';
  const muted = '#9099ad';
  const gold = 'var(--gold)';
  const cardBorder = 'rgba(255,255,255,0.1)';

  const ref = React.useRef(null);
  const inView = useInView(ref);

  const cards = [
    { title: 'Private Equity', desc: 'Mid-market and growth funds pricing acquisitions and portfolio ops.', stat: '40+ funds served' },
    { title: 'Law Firms', desc: 'Litigation, regulatory, and transactional practices needing precedent at speed.', stat: 'AmLaw 200 coverage' },
    { title: 'Owner-Operated Businesses', desc: 'Restaurants, clinics, trades\u2009—\u2009the businesses that open before the first train.', stat: '300+ active accounts' },
    { title: 'Family Offices & Advisors', desc: 'Multi-generational stewards who prize discretion and accuracy equally.', stat: 'Referral-only intake' },
  ];

  return (
    <section id="company" ref={ref} style={{
      background: isDark ? '#080d18' : 'var(--ink)', color:'#f8f6f0',
      padding:'120px 0 140px', position:'relative', overflow:'hidden',
    }}>
      <div className="grain" />
      <div className="container">
        {/* Eyebrow */}
        <div className="h-eyebrow" style={{
          color: gold, marginBottom:24,
          opacity: inView ? 1 : 0,
          transition: 'opacity 0.6s ease 0.1s',
        }}>
          II. &nbsp; Who we serve
        </div>

        {/* Headline */}
        <h2 className="h-display" style={{
          fontSize:'clamp(42px, 5.5vw, 80px)', color:'#f8f6f0', marginBottom:20,
          opacity: inView ? 1 : 0,
          transform: inView ? 'translateY(0)' : 'translateY(18px)',
          transition: 'opacity 0.6s ease 0.15s, transform 0.6s ease 0.15s',
        }}>
          Built for institutions that<br/>cannot afford to guess.
        </h2>

        {/* Deck */}
        <p style={{

          opacity: inView ? 1 : 0,
          transition: 'opacity 0.6s ease 0.25s',
        }}>
          Our clients don't evaluate software — they evaluate risk. We serve the organizations

        </p>

        {/* Card grid */}
        <div style={{

        }}>
          {cards.map((c, i) => (
            <div key={c.title} style={{
              border: `1px solid ${cardBorder}`,

              minHeight:260,

              <div>

function HiringSection({ theme = 'light' }) {

  );

/* ===== components/TweaksPanel.jsx ===== */

function TweaksPanel({ state, setState, visible }) {
  if (!visible) return null;

  const set = (k, v) => {
    setState(s => ({...s, [k]: v}));
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]: v}}, '*');
  };

  const Row = ({label, children}) => (
    <div style={{
      display:'grid', gridTemplateColumns:'86px 1fr', gap:12, alignItems:'center',
      padding:'10px 0', borderBottom:'1px solid rgba(11,18,32,0.06)',
    }}>
      <div style={{
        fontFamily:'JetBrains Mono, monospace', fontSize:10,
        letterSpacing:'0.08em', textTransform:'uppercase', color:'#6b7388',
      }}>{label}</div>
      <div>{children}</div>
    </div>
  );

  const Seg = ({value, onChange, opts}) => (
    <div style={{display:'flex', gap:4, flexWrap:'wrap'}}>
      {opts.map(o => (
        <button key={o.v} onClick={() => onChange(o.v)} style={{
          padding:'6px 10px', fontSize:11,
          border: `1px solid ${value === o.v ? '#0b1220' : 'rgba(11,18,32,0.15)'}`,
          background: value === o.v ? '#0b1220' : '#fff',
          color: value === o.v ? '#f8f6f0' : '#0b1220',
          cursor:'pointer', borderRadius:2,
          fontFamily:'JetBrains Mono, monospace', letterSpacing:'0.04em',
        }}>{o.l}</button>
      ))}
    </div>
  );

  return (
    <div style={{
      position:'fixed', bottom:20, right:20, zIndex:100,
      width:320,
      background:'#f8f6f0',
      border:'1px solid rgba(11,18,32,0.15)',
      boxShadow:'0 30px 60px -20px rgba(0,0,0,0.3)',
      borderRadius:4,
      overflow:'hidden',
      fontFamily:'Inter Tight, sans-serif',
    }}>
      <div style={{
        padding:'14px 16px',
        borderBottom:'1px solid rgba(11,18,32,0.1)',
        background:'#0b1220', color:'#f8f6f0',
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}>
        <span style={{fontFamily:'Instrument Serif, serif', fontSize:20}}>Tweaks</span>
        <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'#c9a961', letterSpacing:'0.1em'}}>SEMPERR</span>
      </div>
      <div style={{padding:'8px 16px 16px'}}>
        <Row label="Theme">
          <Seg value={state.theme} onChange={v => set('theme', v)}
            opts={[{v:'light', l:'Paper'}, {v:'dark', l:'Ink'}]}/>
        </Row>
        <Row label="Accent">
          <Seg value={state.accent} onChange={v => set('accent', v)}
            opts={[{v:'gold', l:'Gold'}, {v:'rust', l:'Rust'}, {v:'steel', l:'Steel'}]}/>
        </Row>
        <Row label="Type">
          <Seg value={state.type} onChange={v => set('type', v)}
            opts={[{v:'instrument', l:'Instrument'}, {v:'dmserif', l:'DM Serif'}, {v:'fraunces', l:'Fraunces'}]}/>
        </Row>
      </div>
    </div>
  );
}

window.TweaksPanel = TweaksPanel;


</script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "gold",
  "type": "instrument"
}/*EDITMODE-END*/;

function applyType(t) {
  const map = {
    instrument: '"Instrument Serif", "Times New Roman", serif',
    dmserif:    '"DM Serif Display", "Times New Roman", serif',
    fraunces:   '"Fraunces", "Times New Roman", serif',
  };
  document.documentElement.style.setProperty('--serif', map[t] || map.instrument);
}
function applyAccent(a) {
  const map = {
    gold:  { a:'#c9a961', d:'#a68846' },
    rust:  { a:'#b8502a', d:'#8a3a1f' },
    steel: { a:'#4a7fc1', d:'#2f5c96' },
  };
  const c = map[a] || map.gold;
  document.documentElement.style.setProperty('--gold', c.a);
  document.documentElement.style.setProperty('--gold-deep', c.d);
}

function App() {
  const [state, setState] = React.useState(TWEAK_DEFAULTS);
  const [tweaksOn, setTweaksOn] = React.useState(false);

  React.useEffect(() => {
    applyType(state.type);
    applyAccent(state.accent);
  }, [state.type, state.accent]);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOn(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const isDark = state.theme === 'dark';

  return (
    <div data-screen-label="Semperr Landing" style={{
      background: isDark ? 'var(--ink)' : 'var(--paper)',
      color: isDark ? 'var(--paper)' : 'var(--ink)',
      minHeight:'100vh',
    }}>
      <Masthead theme={state.theme}/>
      <Hero theme={state.theme}/>
      <CharterSection theme={state.theme}/>
      <ProofSection theme={state.theme}/>
      <CapabilitySection theme={state.theme}/>
      <HiringSection theme={state.theme}/>
      <Footer theme={state.theme}/>

      <TweaksPanel state={state} setState={setState} visible={tweaksOn}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

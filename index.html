<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Semperr — Software serious businesses run on.</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Serif+Display:ital@0;1&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
:root {
  --ink: #0b1220; --ink-soft: #141c2e; --ink-line: #1e2640;
  --paper: #f8f6f0; --paper-warm: #efeadb; --paper-line: #e4dfcf;
  --gold: #c9a961; --gold-deep: #a68846;
  --steel: #4a7fc1; --steel-deep: #2f5c96;
  --rust: #b8502a; --green: #4a7a5c;
  --muted: #6b7388; --muted-paper: #7a7466;
  --serif: "Instrument Serif", "Times New Roman", serif;
  --sans: "Inter Tight", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, "SF Mono", Consolas, monospace;
  --maxw: 1440px; --pad: clamp(20px, 4vw, 64px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--paper); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
body { overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
.h-display { font-family: var(--serif); font-weight: 400; letter-spacing: -0.02em; line-height: 0.95; }
.h-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; }
.h-serif { font-family: var(--serif); font-weight: 400; line-height: 1.02; letter-spacing: -0.015em; }
.t-body { font-size: 16px; line-height: 1.55; color: var(--muted-paper); }
.grain {
  position: absolute; inset: 0; pointer-events: none; opacity: 0.035; mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
}
.hair { border-top: 1px solid var(--paper-line); }
.container { max-width: var(--maxw); margin: 0 auto; padding-left: var(--pad); padding-right: var(--pad); }
@media (max-width: 1100px) {
  .dev-rig-grid { grid-template-columns: 1fr !important; }
}
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }

/* ——— Mobile (<=768px) ——— */
.m-only { display: none; }
@media (max-width: 768px) {
  :root { --pad: 20px; }
  .m-only { display: block !important; }
  .m-hide { display: none !important; }

  /* Collapse multi-column inline grids */
  section [style*="grid-template-columns"],
  footer [style*="grid-template-columns"] { grid-template-columns: 1fr !important; gap: 24px !important; }

  /* Scale down display typography */
  [style*="clamp(64px"], [style*="clamp(60px"] { font-size: 52px !important; line-height: 0.98 !important; }
  [style*="clamp(56px"] { font-size: 46px !important; line-height: 1 !important; }
  [style*="clamp(52px"] { font-size: 42px !important; line-height: 1.02 !important; }
  [style*="clamp(48px"] { font-size: 40px !important; }
  [style*="clamp(42px"] { font-size: 36px !important; }
  [style*="clamp(36px"] { font-size: 30px !important; }

  /* Hero padding */
  section { padding-top: 48px !important; padding-bottom: 56px !important; }

  /* Masthead */
  .mast-nav, .mast-eyebrow, .mast-signin { display: none !important; }
  .mast-burger { display: inline-flex !important; }
  .mast-panel { display: block; }

  /* Product roster: keep desktop grid — but allow two-up for compactness */
  /* Footer columns stack */

  /* Body text reflow */
  p { font-size: 16px !important; line-height: 1.55 !important; }

  /* Dev/Trace-style wide tables (inline) — hide the biggest ones */
  .table-wide { display: none !important; }
}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">

/* ===== components/Wordmark.jsx ===== */
// Semperr wordmark — editorial serif with a small "double-r" detail.
// The double-R ligature is the brand mark: one R in gold.

function Wordmark({ size = 28, tone = "ink", asMark = false }) {
  const color = tone === "ink" ? "#0b1220" : "#f8f6f0";
  const gold = "#c9a961";

  if (asMark) {
    // Just the "rr" mark for small spaces
    return (
      <svg width={size} height={size} viewBox="0 0 48 48" style={{display:'block'}}>
        <text x="24" y="36" textAnchor="middle"
          fontFamily="Instrument Serif, serif" fontSize="42" fill={color} letterSpacing="-2">
          r<tspan fill={gold}>r</tspan>
        </text>
      </svg>
    );
  }

  return (
    <span style={{
      fontFamily:'Instrument Serif, serif',
      fontSize:size,
      color,
      letterSpacing:'-0.02em',
      fontWeight:400,
      lineHeight:1,
      whiteSpace:'nowrap',
      display:'inline-block',
    }}>
      Sempe<span style={{color: gold}}>rr</span>
    </span>
  );
}

window.Wordmark = Wordmark;


/* ===== components/Masthead.jsx ===== */
// Top navigation — quiet, editorial, with a ticker hinting at the parent company's scope.

function Masthead({ theme }) {
  const isDark = theme === 'dark';
  const [open, setOpen] = React.useState(false);
  const panelBg = isDark ? '#0b1220' : '#f8f6f0';
  const line = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(11,18,32,0.08)';
  return (
    <header style={{
      position:'sticky', top:0, zIndex:50,
      background: isDark ? 'rgba(11,18,32,0.78)' : 'rgba(248,246,240,0.78)',
      backdropFilter:'blur(14px) saturate(140%)',
      WebkitBackdropFilter:'blur(14px) saturate(140%)',
      borderBottom: `1px solid ${line}`,
    }}>
      <div className="container" style={{
        display:'flex', alignItems:'center', justifyContent:'space-between',
        height:64,
      }}>
        <div style={{display:'flex', alignItems:'center', gap:40}}>
          <Wordmark size={24} tone={isDark ? 'paper' : 'ink'} />
          <nav className="mast-nav" style={{display:'flex', gap:28, fontSize:13, color: isDark ? '#9099ad' : '#6b7388'}}>
            <a>Products</a>
            <a>Company</a>
            <a>Clients</a>
            <a>Careers</a>
          </nav>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:20}}>
          <span className="h-eyebrow mast-eyebrow" style={{color: isDark ? '#c9a961' : '#a68846'}}>
            Est. MMXXI · NYC
          </span>
          <button className="mast-burger" onClick={() => setOpen(o => !o)} aria-label="Menu" style={{
            display:'none', alignItems:'center', justifyContent:'center',
            width:40, height:40,
            border:`1px solid ${isDark ? 'rgba(255,255,255,0.18)' : 'rgba(11,18,32,0.2)'}`,
            borderRadius:8, color: isDark ? '#f8f6f0' : '#0b1220',
          }}>
            <span style={{display:'grid', gap:4}}>
              <span style={{width:16, height:1.5, background:'currentColor', display:'block'}}/>
              <span style={{width:16, height:1.5, background:'currentColor', display:'block'}}/>
              <span style={{width:16, height:1.5, background:'currentColor', display:'block'}}/>
            </span>
          </button>
          <a href="https://trace.semperr.com/invite" className="mast-signin" style={{
            fontSize:13,
            color: isDark ? '#c7cdd9' : '#2a3246',
            letterSpacing:'0.02em',
          }}>Sign in</a>
          <a href="contact.html" style={{
            fontSize:13,
            padding:'8px 16px',
            border:`1px solid ${isDark ? 'rgba(255,255,255,0.18)' : 'rgba(11,18,32,0.2)'}`,
            borderRadius:999,
            color: isDark ? '#f8f6f0' : '#0b1220',
          }}>Get in touch →</a>
        </div>
      </div>
      {open && (
        <div className="mast-panel m-only" style={{
          background: panelBg, borderTop:`1px solid ${line}`, padding:'16px 20px 24px',
        }}>
          <nav style={{display:'grid', gap:14, fontSize:16, color: isDark ? '#c7cdd9' : '#2a3246', fontFamily:'var(--serif)'}}>
            <a onClick={() => setOpen(false)} href="#">Products</a>
            <a onClick={() => setOpen(false)} href="Trace.html">Trace</a>
            <a onClick={() => setOpen(false)} href="Dev.html">Dev</a>
            <a onClick={() => setOpen(false)} href="charter.html">Charterr</a>
            <a onClick={() => setOpen(false)} href="#">Company</a>
            <a onClick={() => setOpen(false)} href="#">Careers</a>
            <a onClick={() => setOpen(false)} href="https://trace.semperr.com/invite" style={{marginTop:4}}>Sign in</a>
            <a onClick={() => setOpen(false)} href="contact.html" style={{color:'var(--gold)', marginTop:4}}>Get in touch →</a>
          </nav>
        </div>
      )}
    </header>
  );
}

window.Masthead = Masthead;


/* ===== components/Hero.jsx ===== */
// Hero — editorial, confident. Big serif headline, a disciplined grid of product chips below.

function Hero({ variant = 'editorial', theme = 'light' }) {
  const isDark = theme === 'dark';
  const ink = isDark ? '#f8f6f0' : '#0b1220';
  const muted = isDark ? '#9099ad' : '#6b7388';
  const gold = '#c9a961';

  return (
    <section style={{
      position:'relative',
      background: isDark ? 'var(--ink)' : 'var(--paper)',
      padding: '80px 0 96px',
      overflow:'hidden',
    }}>
      <div className="grain" />

      {/* Top editorial slug */}
      <div className="container" style={{marginBottom:48}}>
        <div style={{
          display:'flex', justifyContent:'space-between', alignItems:'center',
          fontSize:11, fontFamily:'JetBrains Mono, monospace', letterSpacing:'0.12em', textTransform:'uppercase',
          color: muted,
        }}>
          <span>Vol. V · No. 11</span>
          <span>The Semperr Broadsheet</span>
          <span>April · 2026</span>
        </div>
        <div className="hair" style={{marginTop:14, borderColor: isDark ? 'rgba(255,255,255,0.1)' : undefined}}/>
      </div>

      {variant === 'editorial' && (
        <div className="container">
          <div style={{display:'grid', gridTemplateColumns:'1fr 360px', gap:80, alignItems:'end'}}>
            <div>
              <div className="h-eyebrow" style={{color: gold, marginBottom:28}}>
                ❖ &nbsp; Quiet tools for loud decisions
              </div>
              <h1 className="h-display" style={{
                fontSize:'clamp(64px, 9.5vw, 156px)',
                color: ink,
              }}>
                Software <em style={{fontStyle:'italic', color: gold}}>serious</em><br/>
                businesses run on.
              </h1>
              <p style={{
                marginTop:36, maxWidth:560, fontSize:19, lineHeight:1.55,
                color: muted,
              }}>
                Semperr builds data and technical infrastructure for people who can't afford to guess — 
                private-equity analysts, law-firm partners, and the small businesses keeping the rest of the economy running.
              </p>
              <div style={{display:'flex', gap:12, marginTop:40}}>
                <a style={{
                  display:'inline-flex', alignItems:'center', gap:10,
                  padding:'14px 22px', borderRadius:999,
                  background: ink, color: isDark ? '#0b1220' : '#f8f6f0',
                  fontSize:14, fontWeight:500,
                }}>Book a briefing <span style={{opacity:0.5}}>↗</span></a>
                <a href="charter.html" style={{
                  display:'inline-flex', alignItems:'center', gap:10,
                  padding:'14px 22px', borderRadius:999,
                  border: `1px solid ${isDark ? 'rgba(255,255,255,0.18)' : 'rgba(11,18,32,0.2)'}`,
                  color: ink, fontSize:14, fontWeight:500,
                }}>Read the charter</a>
              </div>
            </div>

            {/* Right column — a small "masthead of products" block */}
            <ProductRoster ink={ink} muted={muted} gold={gold} isDark={isDark}/>
          </div>
        </div>
      )}

      {variant === 'centered' && (
        <div className="container" style={{textAlign:'center', paddingTop:40}}>
          <div className="h-eyebrow" style={{color: gold, marginBottom:32}}>
            ❖ &nbsp; Three tools, one operating principle
          </div>
          <h1 className="h-display" style={{
            fontSize:'clamp(56px, 11vw, 180px)', color: ink, maxWidth:1100, margin:'0 auto',
          }}>
            Software <em style={{fontStyle:'italic', color: gold}}>serious</em>
            <br/>businesses run on.
          </h1>
          <p style={{
            margin:'40px auto 0', maxWidth:620, fontSize:19, lineHeight:1.55, color: muted,
          }}>
            Semperr builds data and technical infrastructure for people who can't afford to guess.
          </p>
          <div style={{display:'flex', gap:12, justifyContent:'center', marginTop:40}}>
            <a style={{padding:'14px 22px', borderRadius:999, background: ink, color: isDark ? '#0b1220' : '#f8f6f0', fontSize:14, fontWeight:500}}>Book a briefing ↗</a>
            <a href="charter.html" style={{padding:'14px 22px', borderRadius:999, border:`1px solid ${isDark ? 'rgba(255,255,255,0.18)' : 'rgba(11,18,32,0.2)'}`, fontSize:14, fontWeight:500, color: ink}}>Read the charter</a>
          </div>
        </div>
      )}

      {variant === 'split' && (
        <div className="container">
          <div style={{display:'grid', gridTemplateColumns:'1.1fr 1fr', gap:64, alignItems:'center'}}>
            <div>
              <div className="h-eyebrow" style={{color: gold, marginBottom:28}}>❖ &nbsp; Est. MMXXI</div>
              <h1 className="h-display" style={{fontSize:'clamp(56px, 8vw, 132px)', color: ink}}>
                Three tools.<br/>
                <em style={{fontStyle:'italic', color: gold}}>One</em> operating principle.
              </h1>
              <p style={{marginTop:32, maxWidth:520, fontSize:19, lineHeight:1.55, color: muted}}>
                Build things that work the first time, for people who notice. Our clients run private-equity funds, 
                argue precedent-setting cases, and open the shop every Tuesday at 6 AM.
              </p>
            </div>
            <ProductRoster ink={ink} muted={muted} gold={gold} isDark={isDark} large/>
          </div>
        </div>
      )}
    </section>
  );
}

function ProductRoster({ ink, muted, gold, isDark, large }) {
  const rows = [
    { letter:'T', name:'Trace', tag:'Data for private equity', color: gold, href:'Trace.html' },
    { letter:'C', name:'Clad', tag:'Intelligence for law firms', color: '#4a7fc1', href:'Clad.html' },
    { letter:'D', name:'Dev', tag:'Technical services · human led', color: '#b8502a', href:'Dev.html' },
  ];
  return (
    <div style={{
      border:`1px solid ${isDark ? 'rgba(255,255,255,0.1)' : 'rgba(11,18,32,0.12)'}`,
      padding: large ? '28px 28px' : '22px 24px',
      background: isDark ? 'rgba(255,255,255,0.02)' : 'rgba(11,18,32,0.015)',
    }}>
      <div className="h-eyebrow" style={{color: muted, marginBottom:18}}>Our Products</div>
      {rows.map((r, i) => (
        <a href={r.href} key={r.name} style={{
          display:'grid', gridTemplateColumns:'36px 1fr auto', gap:16, alignItems:'baseline',
          padding:'16px 0',
          borderTop: i === 0 ? 'none' : `1px solid ${isDark ? 'rgba(255,255,255,0.08)' : 'rgba(11,18,32,0.08)'}`,
        }}>
          <span className="h-display" style={{fontSize: large ? 40 : 32, color: r.color}}>{r.letter}</span>
          <div>
            <div className="h-serif" style={{fontSize: large ? 28 : 22, color: ink}}>{r.name}</div>
            <div style={{fontSize:12, color: muted, marginTop:2}}>{r.tag}</div>
          </div>
          <span style={{color: muted, fontSize:14}}>↘</span>
        </a>
      ))}
    </div>
  );
}

window.Hero = Hero;


/* ===== components/TraceSection.jsx ===== */
// Trace — data for private equity.
// Aesthetic: terminal / dealbook / ticker. Ink-dark background, gold accent.
// Hover: data points stream in and settle into a live dealbook table; a small network graph pulses.

function TraceSection({ variant = 'dealbook' }) {
  const [hovered, setHovered] = React.useState(false);

  return (
    <section id="trace" style={{
      background:'var(--ink)', color:'var(--paper)',
      padding:'120px 0 140px', position:'relative', overflow:'hidden',
    }}>
      <div className="grain" />

      <div className="container">
        {/* Section chrome */}
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:56}}>
          <div className="h-eyebrow" style={{color:'#c9a961'}}>I. &nbsp; Trace</div>
          <div className="h-eyebrow" style={{color:'#6b7388'}}>Data for private equity</div>
        </div>

        <div
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          style={{
            display:'grid', gridTemplateColumns: variant === 'wide' ? '1fr' : '1.1fr 1.3fr',
            gap: 72, alignItems:'center',
          }}
        >
          {/* Copy */}
          <div>
            <h2 className="h-display" style={{
              fontSize:'clamp(52px, 6.5vw, 104px)', color:'#f8f6f0',
              marginBottom:32,
            }}>
              Every private<br/>
              company,<br/>
              <em style={{fontStyle:'italic', color:'#c9a961'}}>mapped.</em>
            </h2>
            <p className="t-body" style={{maxWidth:460, fontSize:18}}>
              Eight million private companies, continuously traced — ownership graphs, 
              operating metrics, relationship history. The dealbook analysts wish they had 
              before the pitch.
            </p>

            <div style={{marginTop:40, display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:0, maxWidth:520}}>
              <Stat n="8.2M" l="Companies tracked" />
              <Stat n="340K" l="Transactions linked" c/>
              <Stat n="94%" l="LP coverage" c/>
            </div>

            <a href="Trace.html" style={{
              display:'inline-flex', alignItems:'center', gap:10, marginTop:48,
              padding:'14px 22px', borderRadius:999,
              background:'#c9a961', color:'#0b1220', fontSize:14, fontWeight:500,
            }}>Explore Trace ↗</a>
          </div>

          {/* Visual: dealbook */}
          <div className="m-hide"><TraceDealbook hovered={hovered} /></div>
        </div>
      </div>
    </section>
  );
}

function Stat({ n, l, c }) {
  return (
    <div style={{
      paddingLeft: c ? 20 : 0,
      borderLeft: c ? '1px solid rgba(255,255,255,0.12)' : 'none',
    }}>
      <div className="h-serif" style={{fontSize:36, color:'#f8f6f0'}}>{n}</div>
      <div style={{fontSize:11, color:'#6b7388', marginTop:6, fontFamily:'JetBrains Mono, monospace', letterSpacing:'0.08em', textTransform:'uppercase'}}>{l}</div>
    </div>
  );
}

function TraceDealbook({ hovered }) {
  // seed rows appear & flow on hover
  const rows = [
    ['Helix Logistics',    'Carlyle',     '$1.2B', 'Platform',   'Mar 12'],
    ['Atlas Precision',    'Vista',       '$410M', 'Add-on',     'Mar 09'],
    ['Meridian Supply',    'Bain Cap.',   '$2.4B', 'Secondary',  'Feb 28'],
    ['Verra Health',       'KKR',         '$860M', 'Platform',   'Feb 22'],
    ['Copperline Foods',   'Apollo',      '$315M', 'Add-on',     'Feb 18'],
    ['Northwind Ceramics', 'Genstar',     '$540M', 'Carve-out',  'Feb 11'],
  ];

  return (
    <div style={{
      position:'relative',
      background:'#0f1729',
      border:'1px solid rgba(201,169,97,0.2)',
      borderRadius:2,
      padding:'28px 0 0',
      boxShadow:'0 40px 80px -30px rgba(0,0,0,0.6)',
      transform: hovered ? 'translateY(-2px)' : 'translateY(0)',
      transition:'transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1)',
      overflow:'hidden',
    }}>
      {/* Ticker strip */}
      <div style={{
        display:'flex', justifyContent:'space-between', alignItems:'center',
        padding:'0 24px 20px', borderBottom:'1px solid rgba(255,255,255,0.08)',
        fontFamily:'JetBrains Mono, monospace', fontSize:10, letterSpacing:'0.1em', textTransform:'uppercase',
      }}>
        <div style={{color:'#c9a961'}}>● &nbsp; DEALBOOK / LIVE</div>
        <div style={{color:'#6b7388'}}>Last sync · 00:00:12 ago</div>
      </div>

      {/* Column headers */}
      <div style={{
        display:'grid', gridTemplateColumns:'2fr 1.3fr 1fr 1fr 0.8fr',
        padding:'12px 24px', gap:16,
        fontFamily:'JetBrains Mono, monospace', fontSize:10, letterSpacing:'0.08em', textTransform:'uppercase',
        color:'#6b7388',
        borderBottom:'1px solid rgba(255,255,255,0.06)',
      }}>
        <div>Target</div><div>Sponsor</div><div>EV</div><div>Type</div><div>Date</div>
      </div>

      {/* Rows */}
      <div style={{position:'relative'}}>
        {rows.map((r, i) => (
          <div key={i} style={{
            display:'grid', gridTemplateColumns:'2fr 1.3fr 1fr 1fr 0.8fr',
            padding:'14px 24px', gap:16,
            fontSize:13, color:'#d4dbe8',
            borderBottom: i === rows.length - 1 ? 'none' : '1px solid rgba(255,255,255,0.04)',
            opacity: hovered ? 1 : 0.35,
            transform: hovered ? 'translateX(0)' : 'translateX(-8px)',
            transition: `all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) ${i * 0.06}s`,
          }}>
            <div style={{color:'#f8f6f0', fontWeight:500}}>{r[0]}</div>
            <div>{r[1]}</div>
            <div style={{color:'#c9a961', fontFamily:'JetBrains Mono, monospace'}}>{r[2]}</div>
            <div style={{fontSize:11, fontFamily:'JetBrains Mono, monospace', color:'#9099ad'}}>{r[3]}</div>

/* ———————————— HUMAN PORTRAIT ———————————— */
// Pixelated silhouette that dissolves from static into a clearer form on hover.

function HumanPortrait({ hovered, flashLevel }) {
  // Generate a pixel-art portrait of a person using colored rectangles.
  // Palette warms up and resolves on hover.
  const GRID = 28;
  const CELL = 8;

  const portrait = React.useMemo(() => makePortraitGrid(GRID), []);

  return (
    <div style={{
      position:'relative',
      width: GRID * CELL + 40, height: GRID * CELL + 40,
      display:'flex', alignItems:'center', justifyContent:'center',
    }}>
      {/* Aura */}
      <div style={{
        position:'absolute', inset: 0,
        background:'radial-gradient(circle at 50% 55%, rgba(184,80,42,0.35), transparent 65%)',
        opacity: hovered ? 1 : 0.4, transition:'opacity 0.6s',
        filter:'blur(8px)',
      }}/>

      <svg width={GRID * CELL} height={GRID * CELL} style={{position:'relative'}}>
        {/* Static noise layer — fades on hover */}
        <NoiseField GRID={GRID} CELL={CELL} hovered={hovered} flashLevel={flashLevel}/>

        {/* Portrait pixels */}
        {portrait.map((row, y) =>
          row.map((cell, x) => {
            if (!cell) return null;
            // cell = 'skin' | 'hair' | 'shirt' | 'eye' | 'mouth' | 'bg'
            const colorMap = hovered ? {
              skin:  '#f1c2a3',
              hair:  '#2a1f14',
              shirt: '#b8502a',
              eye:   '#2a1f14',
              mouth: '#8a3a1f',
              cheek: '#e89579',
              shadow:'#c9916f',
            } : {
              // Pre-hover: desaturated / static
              skin:  '#4a4852',
              hair:  '#1e1e28',
              shirt: '#3a2e28',
              eye:   '#1e1e28',
              mouth: '#3a2e28',
              cheek: '#4a4852',
              shadow:'#3a3840',
            };
            return (
              <rect key={`${x}-${y}`}
                x={x * CELL} y={y * CELL}
                width={CELL + 0.5} height={CELL + 0.5}
                fill={colorMap[cell] || '#1e1e28'}
                style={{
                  transition:`fill 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) ${(x + y) * 0.005}s`,
                }}
              />
            );
          })
        )}

        {/* Scanlines */}
        <g style={{opacity: hovered ? 0.1 : 0.25, transition:'opacity 0.5s', pointerEvents:'none'}}>
          {[...Array(Math.floor(GRID * CELL / 3))].map((_, i) => (
            <rect key={i} x="0" y={i * 3} width={GRID * CELL} height="1" fill="rgba(0,0,0,0.3)" />
          ))}
        </g>
      </svg>

      {/* CRT vignette */}
      <div style={{
        position:'absolute', inset:0,
        background:'radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6))',
        pointerEvents:'none',
      }}/>
    </div>
  );
}

function NoiseField({ GRID, CELL, hovered, flashLevel }) {
  const [seed, setSeed] = React.useState(0);
  React.useEffect(() => {
    const id = setInterval(() => setSeed(s => s + 1), hovered ? 300 : 120);
    return () => clearInterval(id);
  }, [hovered]);

  const opacity = hovered ? Math.max(0, 0.08 - flashLevel * 0.005) : 0.55;
  const cells = [];
  // sparse noise
  const N = Math.floor(GRID * GRID * (hovered ? 0.15 : 0.55));
  for (let i = 0; i < N; i++) {
    const x = Math.floor(Math.random() * GRID);
    const y = Math.floor(Math.random() * GRID);
    const v = Math.random();
    cells.push({x, y, v});
  }

  return (
    <g key={seed} style={{opacity, transition:'opacity 0.6s'}}>
      {cells.map((c, i) => (
        <rect key={i}
          x={c.x * CELL} y={c.y * CELL}
          width={CELL} height={CELL}
          fill={c.v > 0.7 ? '#f8f6f0' : c.v > 0.4 ? '#6b7388' : '#1e1e28'}
        />
      ))}
    </g>
  );
}

// Hand-laid pixel grid for the portrait. 28x28.
// Symbols: s=skin, h=hair, t=shirt (shirt), e=eye, m=mouth, c=cheek, d=shadow
function makePortraitGrid(GRID) {
  const raw = [
    '............................',
    '............................',
    '...........hhhhhhh..........',
    '.........hhhhhhhhhhh........',
    '........hhhhhhhhhhhhh.......',
    '.......hhssssssssshhhh......',
    '......hhsssssssssshhhh......',
    '......hsssssssssssshh.......',
    '......hssssssssssssss.......',
    '.....hssssdssssdssssh.......',
    '.....hsseeessseeesssh.......',
    '.....hssssssssssssssh.......',
    '.....hssssssddssssssh.......',
    '......hsssssssssssss........',
    '......hsscsssssscsss........',
    '......hssssmmmmmssss........',
    '.......hssssmmmsss..........',
    '........hsssssss............',
    '.........hssssss............',
    '..........sssss.............',
    '.........tssssst............',
    '........ttssssstt...........',
    '.......tttsssstttt..........',
    '......ttttttttttttt.........',
    '.....tttttttttttttttt.......',
    '....ttttttttttttttttttt.....',
    '...ttttttttttttttttttttt....',

/* ———————————— WAVEFORM ———————————— */

function Waveform({ hovered, tick }) {
  const bars = 48;
  return (
    <div style={{
      display:'flex', alignItems:'center', gap:3, height:44,
    }}>
      {[...Array(bars)].map((_, i) => {
        const phase = (tick * 0.6 + i * 0.4);
        const base = Math.sin(phase) * 0.5 + 0.5;
        const active = hovered ? 1 : 0.4;
        const h = 6 + Math.pow(base, 2) * 38 * active;
        return (
          <div key={i} style={{
            width:3, height: h,
            background: i < 24 ? '#b8502a' : '#c9a961',
            opacity: 0.6 + base * 0.4,
            transition:'height 0.18s ease-out, background 0.5s',
          }}/>
        );
      })}
    </div>
  );
}

/* ———————————— TYPED LINE ———————————— */

function TypedLine({ hovered }) {
  const line = '"Hi, I\'m Emma from Brennan\'s Bakery — can I take a message?"';
  const [n, setN] = React.useState(0);
  React.useEffect(() => {
    if (!hovered) { setN(0); return; }
    const id = setInterval(() => {
      setN(v => (v < line.length ? v + 1 : v));
    }, 28);
    return () => clearInterval(id);
  }, [hovered]);

  return (
    <span>
      {line.slice(0, hovered ? n : line.length)}
      {hovered && n < line.length && <span style={{opacity:0.6}}>▍</span>}
    </span>
  );
}

/* ———————————— CODE ASSEMBLY ———————————— */

function CodeAssembly({ hovered }) {
  const lines = [
    { i:0, t:<><span style={{color:'#6b7388'}}>01</span> <span style={{color:'#b8502a'}}>import</span> <span style={{color:'#c9a961'}}>{'{ Header, Hero }'}</span> <span style={{color:'#b8502a'}}>from</span> <span style={{color:'#4a7a5c'}}>'./bakery'</span></>},

    { i:2, t:<><span style={{color:'#6b7388'}}>03</span> &nbsp;&nbsp;<span style={{color:'#b8502a'}}>return</span> &lt;<span style={{color:'#c9a961'}}>Hero</span> title=<span style={{color:'#4a7a5c'}}>"Fresh daily."</span> /&gt;</>},
    { i:3, t:<><span style={{color:'#6b7388'}}>04</span> {'}'}</>},

  return (
    <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:12, lineHeight:1.8}}>
      {lines.map((l) => (
        <div key={l.i} style={{
          opacity: hovered ? 1 : 0.35,

        }}>{l.t}</div>

        marginTop:10, display:'flex', alignItems:'center', gap:8,

      }}>

}

/* ———————————— BACKDROP ———————————— */

function DevGridBackdrop({ flashLevel }) {

}

/* ———————————— GLITCH TEXT ———————————— */

function GlitchText({ children, hovered, flashLevel }) {
  return (
    <span style={{position:'relative', display:'inline-block', color:'#f8f6f0'}}>
      {children}
      {hovered && flashLevel > 3 && (
        <>
          <span style={{
            position:'absolute', left:0, top:0, color:'#b8502a',
            clipPath:'inset(0 0 60% 0)',
            transform:'translate(-1px, 0)',
            animation:'devGlitch 0.3s infinite',
          }}>{children}</span>
          <span style={{
            position:'absolute', left:0, top:0, color:'#4a7fc1',
            clipPath:'inset(60% 0 0 0)',
            transform:'translate(1px, 0)',
            animation:'devGlitch 0.3s infinite reverse',
          }}>{children}</span>
        </>
      )}
      <style>{`
        @keyframes devGlitch {
          0%, 100% { transform: translate(-1px, 0); }
          25% { transform: translate(1px, 0); }
          50% { transform: translate(-1px, 1px); }
          75% { transform: translate(1px, -1px); }
        }
      `}</style>
    </span>
  );
}

// Tweaks panel — floating bottom-right. Exposes the Edit Mode-driven knobs.

function TweaksPanel({ state, setState, visible }) {
  if (!visible) return null;

  const set = (k, v) => {
    setState(s => ({...s, [k]: v}));
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]: v}}, '*');

  const Row = ({label, children}) => (

  );

      {opts.map(o => (
        <button key={o.v} onClick={() => onChange(o.v)} style={{
          padding:'6px 10px', fontSize:11,
          border: `1px solid ${value === o.v ? '#0b1220' : 'rgba(11,18,32,0.15)'}`,
          background: value === o.v ? '#0b1220' : '#fff',
          color: value === o.v ? '#f8f6f0' : '#0b1220',
          cursor:'pointer', borderRadius:2,
          fontFamily:'JetBrains Mono, monospace', letterSpacing:'0.04em',
        }}>{o.l}</button>
      ))}
    </div>
  );

  return (
    <div style={{
      position:'fixed', bottom:20, right:20, zIndex:100,
      width:320,
      background:'#f8f6f0',
      border:'1px solid rgba(11,18,32,0.15)',
      boxShadow:'0 30px 60px -20px rgba(0,0,0,0.3)',
      borderRadius:4,
      overflow:'hidden',
      fontFamily:'Inter Tight, sans-serif',
    }}>
      <div style={{
        padding:'14px 16px',
        borderBottom:'1px solid rgba(11,18,32,0.1)',
        background:'#0b1220', color:'#f8f6f0',
        display:'flex', justifyContent:'space-between', alignItems:'center',
      }}>
        <span style={{fontFamily:'Instrument Serif, serif', fontSize:20}}>Tweaks</span>
        <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'#c9a961', letterSpacing:'0.1em'}}>SEMPERR</span>

      <div style={{padding:'8px 16px 16px'}}>
        <Row label="Theme">
          <Seg value={state.theme} onChange={v => set('theme', v)}
            opts={[{v:'light', l:'Paper'}, {v:'dark', l:'Ink'}]}/>
        </Row>
        <Row label="Hero">
          <Seg value={state.heroVariant} onChange={v => set('heroVariant', v)}
            opts={[{v:'editorial', l:'Editorial'}, {v:'centered', l:'Centered'}, {v:'split', l:'Split'}]}/>
        </Row>
        <Row label="Accent">
          <Seg value={state.accent} onChange={v => set('accent', v)}
            opts={[{v:'gold', l:'Gold'}, {v:'rust', l:'Rust'}, {v:'steel', l:'Steel'}]}/>
        </Row>
        <Row label="Type">
          <Seg value={state.type} onChange={v => set('type', v)}
            opts={[{v:'instrument', l:'Instrument'}, {v:'dmserif', l:'DM Serif'}, {v:'fraunces', l:'Fraunces'}]}/>
        </Row>
        <Row label="Dev flash">
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <input type="range" min="0" max="10" value={state.flashLevel}
              onChange={e => set('flashLevel', +e.target.value)}

            <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:11, color:'#0b1220', width:20, textAlign:'right'}}>{state.flashLevel}</span>
          </div>
        </Row>
      </div>
    </div>
  );
}

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "heroVariant": "editorial",
  "accent": "steel",
  "type": "instrument",
  "flashLevel": 8
}/*EDITMODE-END*/;

function applyType(t) {
  const map = {
    instrument: '"Instrument Serif", "Times New Roman", serif',
    dmserif:    '"DM Serif Display", "Times New Roman", serif',
    fraunces:   '"Fraunces", "Times New Roman", serif',
  };
  document.documentElement.style.setProperty('--serif', map[t] || map.instrument);
}
function applyAccent(a) {
  const map = {
    gold:  { a:'#c9a961', d:'#a68846' },
    rust:  { a:'#b8502a', d:'#8a3a1f' },
    steel: { a:'#4a7fc1', d:'#2f5c96' },
  };
  const c = map[a] || map.gold;
  document.documentElement.style.setProperty('--gold', c.a);
  document.documentElement.style.setProperty('--gold-deep', c.d);
}

function App() {
  const [state, setState] = React.useState(TWEAK_DEFAULTS);
  const [tweaksOn, setTweaksOn] = React.useState(false);

  React.useEffect(() => {
    applyType(state.type);
    applyAccent(state.accent);
  }, [state.type, state.accent]);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOn(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const isDark = state.theme === 'dark';

  return (
    <div data-screen-label="Semperr Landing" style={{
      background: isDark ? 'var(--ink)' : 'var(--paper)',
      color: isDark ? 'var(--paper)' : 'var(--ink)',
      minHeight:'100vh',
    }}>
      <Masthead theme={state.theme}/>
      <Hero variant={state.heroVariant} theme={state.theme}/>
      <TraceSection variant="dealbook"/>
      <CladSection variant="dossier"/>
      <DevSection flashLevel={state.flashLevel}/>
      <Outro theme={state.theme}/>

      <TweaksPanel state={state} setState={setState} visible={tweaksOn}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<style>
:root {
  --ink:#0b1220; --ink-soft:#141c2e;
  --paper:#f8f6f0; --paper-warm:#efeadb; --paper-line:#e4dfcf;
  --gold:#c9a961; --steel:#4a7fc1; --rust:#b8502a; --green:#4a7a5c;
  --serif:"Instrument Serif","Times New Roman",serif;
  --sans:"Inter Tight","Inter",-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Consolas,monospace;
  --maxw:1440px; --pad:clamp(20px,4vw,64px);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
body{overflow-x:hidden}
a{color:inherit;text-decoration:none;cursor:pointer}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
.h-display{font-family:var(--serif);font-weight:400;letter-spacing:-0.02em;line-height:0.95}
.h-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;font-weight:500}
.h-serif{font-family:var(--serif);font-weight:400;line-height:1.02;letter-spacing:-0.015em}
.grain{position:absolute;inset:0;pointer-events:none;opacity:0.035;mix-blend-mode:multiply;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>")}
.container{max-width:var(--maxw);margin:0 auto;padding-left:var(--pad);padding-right:var(--pad)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:10px}
@keyframes devPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.85)}}
@media (max-width:1100px){
  section [style*="gridTemplateColumns"]{grid-template-columns:1fr !important}
}

/* ——— Mobile (<=768px) ——— */
.m-only { display: none; }
@media (max-width: 768px) {
  :root { --pad: 20px; }
  .m-only { display: block !important; }
  .m-hide { display: none !important; }

  section [style*="gridTemplateColumns"],
  header [style*="gridTemplateColumns"],
  footer [style*="gridTemplateColumns"] { grid-template-columns: 1fr !important; gap: 20px !important; }

  [style*="clamp(64px"], [style*="clamp(60px"], [style*="clamp(52px"] { font-size: 46px !important; line-height: 0.98 !important; }
  [style*="clamp(56px"] { font-size: 44px !important; line-height: 1 !important; }
  [style*="clamp(48px"] { font-size: 38px !important; }
  [style*="clamp(42px"] { font-size: 34px !important; }
  [style*="clamp(36px"] { font-size: 28px !important; }

  section { padding-top: 56px !important; padding-bottom: 56px !important; }

  /* Masthead */
  .mast-nav, .mast-eyebrow, .mast-live, .mast-cta { display: none !important; }
  .mast-burger { display: inline-flex !important; }

  p { font-size: 16px !important; line-height: 1.55 !important; }
}

// Semperr wordmark — editorial serif with a small "double-r" detail.
// The double-R ligature is the brand mark: one R in gold.

function Wordmark({ size = 28, tone = "ink", asMark = false }) {
  const color = tone === "ink" ? "#0b1220" : "#f8f6f0";
  const gold = "#c9a961";

  if (asMark) {
    // Just the "rr" mark for small spaces
    return (
      <svg width={size} height={size} viewBox="0 0 48 48" style={{display:'block'}}>
        <text x="24" y="36" textAnchor="middle"
          fontFamily="Instrument Serif, serif" fontSize="42" fill={color} letterSpacing="-2">
          r<tspan fill={gold}>r</tspan>
        </text>
      </svg>
    );
  }

  return (
    <span style={{
      fontFamily:'Instrument Serif, serif',
      fontSize:size,
      color,
      letterSpacing:'-0.02em',
      fontWeight:400,
      lineHeight:1,
      whiteSpace:'nowrap',
      display:'inline-block',
    }}>
      Sempe<span style={{color: gold}}>rr</span>
    </span>
  );
}

window.Wordmark = Wordmark;

// Dev Hero — "Don't worry about it. Dev is on it."

      padding:'72px 0 48px',
    }}>
      <div className="grain"/>
      {/* Editorial slug */}
      <div className="container" style={{marginBottom: 36}}>
        <div style={{
          display:'flex', justifyContent:'space-between', alignItems:'center',
          fontSize:11, fontFamily:'JetBrains Mono, monospace',
          letterSpacing:'0.12em', textTransform:'uppercase',
          color:'#6b7388',
        }}>
          <span>Semperr · Dev</span>
          <span>For small businesses</span>
          <span>MMXXVI</span>
        </div>
        <div style={{marginTop:14, borderTop:'1px solid rgba(11,18,32,0.1)'}}/>
      </div>

      <div className="container">
        <div style={{
          display:'grid',
          gridTemplateColumns:'minmax(380px, 1fr) minmax(520px, 1.15fr)',
          gap:56, alignItems:'center',
          minHeight: 700,
        }}>
          {/* Copy */}
          <div>

              ❖ &nbsp; A real human on every account
            </div>
            <h1 className="h-display" style={{fontSize:'clamp(60px, 8vw, 124px)', color:'#0b1220'}}>
              Don't worry<br/>
              about it.<br/>
              <em style={{fontStyle:'italic', color:'#b8502a'}}>Dev</em> is on it.
            </h1>
            <p style={{
              marginTop:32, maxWidth:520, fontSize:19, lineHeight:1.55, color:'#4a4638',
            }}>
              You're busy running a business. We handle the websites, the phones that need answering,
              the back-office that's held together with duct tape — everything technical that
              stands between you and another service Tuesday.
            </p>
            <div style={{display:'flex', gap:12, marginTop:36, flexWrap:'wrap'}}>

                display:'inline-flex', alignItems:'center', gap:10,
                padding:'14px 22px', borderRadius:999,
                background:'#0b1220', color:'#f8f6f0', fontSize:14, fontWeight:500,
                boxShadow:'0 0 24px rgba(184,80,42,0.2)',
              }}>Get your engineer ↗</a>
              <a style={{
                display:'inline-flex', alignItems:'center', gap:10,
                padding:'14px 22px', borderRadius:999,
                border:'1px solid rgba(11,18,32,0.2)', color:'#0b1220',

              }}>See who's online</a>
            </div>
            <div style={{

            }}>
              <div style={{display:'flex'}}>

/* ———— Logo swarm: SMB glyphs orbit, then collide into center where Dev assembles a site ———— */
function LogoSwarm() {
  const [building, setBuilding] = React.useState(0);
  const smbs = [
    { name:"Brennan's Bakery", tag:'Est. 1974', icon:'🥐', tone:'#c9a961', role:'bakery' },
    { name:"Dr. Halper, DVM",  tag:'Vet clinic',icon:'🐾', tone:'#4a7a5c', role:'vet' },
    { name:"Orozco Plumbing",   tag:'24/7',     icon:'🔧', tone:'#4a7fc1', role:'plumbing' },
    { name:"Quinn & Rowe",     tag:'Law',       icon:'§',  tone:'#0b1220', role:'law' },
    { name:"Marco's Auto",     tag:'Repairs',   icon:'⚙',  tone:'#b8502a', role:'auto' },
    { name:"Fern & Thyme",     tag:'Florist',   icon:'❀', tone:'#8a3a1f', role:'florist' },
  ];
  React.useEffect(() => {
    const id = setInterval(() => setBuilding(b => (b + 1) % smbs.length), 2400);
    return () => clearInterval(id);
  }, []);

  return (
    <div style={{
      position:'relative', width:'100%', height: 700,
      display:'flex', alignItems:'center', justifyContent:'center',
    }}>
      {/* Soft radial background */}
      <div style={{
        position:'absolute', inset:0,
        background:'radial-gradient(circle at 50% 50%, rgba(184,80,42,0.08), transparent 60%)',
      }}/>

      {/* Orbit rings */}
      <svg style={{position:'absolute', inset:0, width:'100%', height:'100%'}} viewBox="-360 -360 720 720">
        <ellipse cx="0" cy="0" rx="340" ry="300" fill="none" stroke="rgba(11,18,32,0.08)" strokeDasharray="2 6"/>
        <ellipse cx="0" cy="0" rx="240" ry="210" fill="none" stroke="rgba(11,18,32,0.06)" strokeDasharray="2 6"/>
      </svg>

      {/* Orbiting SMB chips */}
      <div style={{position:'absolute', inset:0}}>
        {smbs.map((s, i) => {
          const active = i === building;
          const angle = (i / smbs.length) * Math.PI * 2;
          const rx = 340, ry = 300;
          const x = Math.cos(angle) * rx;
          const y = Math.sin(angle) * ry;
          return (
            <div key={i} style={{
              position:'absolute', left:'50%', top:'50%',
              transform: active
                ? `translate(-50%, -50%) scale(1.05)`
                : `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(0.96)`,
              transition:'transform 1.1s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.6s',
              opacity: active ? 0 : 1,
              pointerEvents:'none',
            }}>
              <SmbChip smb={s}/>
            </div>
          );
        })}
      </div>

      {/* Central stage — where Dev builds */}
      <CenterStage smb={smbs[building]} key={building}/>

      {/* Connector lines animate toward center when building */}
      <svg style={{position:'absolute', inset:0, width:'100%', height:'100%', pointerEvents:'none'}} viewBox="-360 -360 720 720">
        {smbs.map((s, i) => {
          if (i === building) return null;
          const angle = (i / smbs.length) * Math.PI * 2;
          const rx = 340, ry = 300;
          const x = Math.cos(angle) * rx;
          const y = Math.sin(angle) * ry;
          return (
            <line key={i} x1={x} y1={y} x2="0" y2="0"
              stroke="rgba(184,80,42,0.15)" strokeWidth="0.6"/>
          );
        })}
      </svg>
    </div>
  );
}

function SmbChip({ smb }) {
  return (
    <div style={{
      display:'flex', alignItems:'center', gap:10,
      padding:'10px 14px',
      background:'#fbf9f2', border:`1px solid ${smb.tone}40`,
      boxShadow:'0 8px 20px -10px rgba(11,18,32,0.15)',
      whiteSpace:'nowrap',
    }}>
      <span style={{
        width:32, height:32, display:'grid', placeItems:'center',
        background: smb.tone + '1a', color: smb.tone,
        fontSize:18, fontFamily:'Instrument Serif, serif',
      }}>{smb.icon}</span>
      <div>
        <div style={{fontFamily:'Instrument Serif, serif', fontSize:15, color:'#0b1220', lineHeight:1.1}}>{smb.name}</div>
        <div style={{fontSize:10, fontFamily:'JetBrains Mono, monospace', color:'#7a7466', letterSpacing:'0.06em', textTransform:'uppercase', marginTop:2}}>{smb.tag}</div>
      </div>
    </div>
  );
}

function CenterStage({ smb }) {
  const [phase, setPhase] = React.useState(0);
  React.useEffect(() => {
    const steps = [250, 500, 900, 1400];
    const ids = steps.map((t, i) => setTimeout(() => setPhase(i+1), t));
    return () => ids.forEach(clearTimeout);
  }, [smb]);

  return (
    <div style={{
      position:'relative', width: 360, height: 420,
      background:'#fbf9f2',
      border:'1px solid rgba(11,18,32,0.12)',
      boxShadow:'0 30px 60px -20px rgba(11,18,32,0.2)',
      padding:0,
      overflow:'hidden',
      zIndex:2,
    }}>
      {/* Browser chrome */}
      <div style={{
        display:'flex', alignItems:'center', gap:6,
        padding:'10px 14px',
        borderBottom:'1px solid rgba(11,18,32,0.08)',
        background:'#efeadb',
      }}>
        <span style={{width:9, height:9, borderRadius:'50%', background:'#b8502a'}}/>
        <span style={{width:9, height:9, borderRadius:'50%', background:'#c9a961'}}/>
        <span style={{width:9, height:9, borderRadius:'50%', background:'#4a7a5c'}}/>
        <span style={{
          marginLeft:12, fontFamily:'JetBrains Mono, monospace', fontSize:10,
          color:'#7a7466',
        }}>
          {smb.name.toLowerCase().replace(/[^a-z]/g,'')}.com
        </span>
      </div>

      {/* "Site" contents — placeholder typography based on SMB */}
      <div style={{padding:'24px 22px', display:'flex', flexDirection:'column', gap:16, height:'calc(100% - 37px)'}}>
        <div style={{
          opacity: phase >= 1 ? 1 : 0,
          transform: phase >= 1 ? 'translateY(0)' : 'translateY(8px)',
          transition:'all 0.4s',
        }}>
          <div style={{fontSize:10, fontFamily:'JetBrains Mono, monospace', color: smb.tone, letterSpacing:'0.12em', textTransform:'uppercase', marginBottom:6}}>{smb.tag}</div>
          <div style={{fontFamily:'Instrument Serif, serif', fontSize:30, color:'#0b1220', lineHeight:1}}>{smb.name}</div>
        </div>

        {/* Hero image block */}
        <div style={{
          height:120,
          background:`linear-gradient(135deg, ${smb.tone}30, ${smb.tone}80)`,
          position:'relative', overflow:'hidden',
          opacity: phase >= 2 ? 1 : 0,
          transform: phase >= 2 ? 'scale(1)' : 'scale(0.96)',
          transition:'all 0.5s',
        }}>
          <div style={{
            position:'absolute', inset:0,
            background:`repeating-linear-gradient(45deg, transparent 0, transparent 8px, ${smb.tone}20 8px, ${smb.tone}20 9px)`,
          }}/>
          <div style={{
            position:'absolute', bottom:10, left:12,
            fontSize:40, fontFamily:'Instrument Serif, serif',
            color:'#fbf9f2', fontStyle:'italic',
          }}>{smb.icon}</div>
        </div>

        {/* Content lines */}
        <div style={{
          display:'flex', flexDirection:'column', gap:8,
          opacity: phase >= 3 ? 1 : 0,
          transition:'opacity 0.5s',
        }}>
          {[96, 82, 60].map((w, i) => (
            <div key={i} style={{
              height: 8, width: `${w}%`,
              background:'rgba(11,18,32,0.1)',
            }}/>
          ))}
        </div>

        {/* CTA */}
        <div style={{marginTop:'auto', display:'flex', gap:8,
          opacity: phase >= 4 ? 1 : 0,
          transform: phase >= 4 ? 'translateY(0)' : 'translateY(6px)',
          transition:'all 0.4s',
        }}>
          <div style={{
            padding:'10px 14px',
            background: smb.tone, color:'#fbf9f2',
            fontFamily:'Inter Tight, sans-serif', fontSize:11, fontWeight:500,
          }}>Book now</div>
          <div style={{
            padding:'10px 14px',
            border:`1px solid ${smb.tone}60`, color: smb.tone,
            fontFamily:'Inter Tight, sans-serif', fontSize:11, fontWeight:500,
          }}>Our story</div>
        </div>
      </div>

      {/* Build progress overlay */}
      {phase < 4 && (
        <div style={{
          position:'absolute', bottom:0, left:0, right:0,
          padding:'8px 14px',
          background:'rgba(11,18,32,0.85)', color:'#f8f6f0',
          fontFamily:'JetBrains Mono, monospace', fontSize:10,
          letterSpacing:'0.1em', textTransform:'uppercase',
          display:'flex', justifyContent:'space-between',
        }}>
          <span>◉ Building · {smb.name}</span>
          <span>{phase * 25}%</span>
        </div>
      )}
    </div>
  );
}

function Row({ label, value, mono, color }) {
  return (
    <div style={{display:'flex', justifyContent:'space-between', padding:'4px 0'}}>
      <span style={{fontSize:13, color:'#7a7466'}}>{label}</span>
      <span style={{

        fontSize:13, color: color || '#0b1220',
      }}>{value}</span>
    </div>
  );
}

function AnimatedNumber({ value }) {
  const [display, setDisplay] = React.useState(value);
  React.useEffect(() => {
    const start = display, end = value;
    if (start === end) return;
    const dur = 600, t0 = performance.now();
    let raf;
    const tick = (t) => {
      const p = Math.min(1, (t - t0) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      setDisplay(Math.round(start + (end - start) * eased));
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return (
    <span style={{
      fontFamily:'Instrument Serif, serif', fontSize:36,
      color: display >= 0 ? '#4a7a5c' : '#b8502a',
      fontStyle:'italic', letterSpacing:'-0.02em',
    }}>
      {display >= 0 ? '+' : '−'}${Math.abs(display).toLocaleString()}
    </span>
  );
}

  const [lineIdx, setLineIdx] = React.useState(0);

  const transcript = [
    { who:'ai',     t:"Hi, thanks for calling Brennan's Bakery! This is Emma, how can I help you today?" },
    { who:'caller', t:"Hi — I'd like to order a birthday cake for Saturday." },
    { who:'ai',     t:"Wonderful. What flavor were you thinking, and how many people are you serving?" },
    { who:'caller', t:"Chocolate, for about twelve people. Can you do writing on it?" },
    { who:'ai',     t:"Of course. What would you like it to say, and what name should I put the order under?" },

    { who:'ai',     t:"Got it. Chocolate cake for twelve, 'Happy 40th, Linda,' pickup Saturday. I'll text Tom a confirmation. Anything else?" },
    { who:'caller', t:"That's it, thanks!" },
    { who:'ai',     t:"You're welcome — have a great evening!" },

  const start = () => {

    setPhase('ringing');

      const id = setTimeout(() => setPhase('done'), 1200);
      return () => clearTimeout(id);
    }
    const delay = 900 + transcript[lineIdx].t.length * 20;
    const id = setTimeout(() => setLineIdx(i => i + 1), delay);
    return () => clearTimeout(id);
  }, [lineIdx, phase]);

  return (

              {[
                ['Answers in 1 ring', '24 hours a day, in your voice'],
                ['Books, quotes, transfers', 'Works with your calendar & CRM'],
                ['Texts you a summary', 'Before you finish your sandwich'],
              ].map(([a, b], i) => (
                <div key={i} style={{
                  display:'grid', gridTemplateColumns:'24px 1fr',
                  gap:14, alignItems:'start',
                  padding:'12px 0',
                  borderTop: i === 0 ? 'none' : '1px solid rgba(11,18,32,0.08)',

                    background:'#b8502a', color:'#fbf9f2',

              padding:'14px 22px', borderRadius:999,
              background: phase === 'idle' || phase === 'done' ? '#b8502a' : '#0b1220',

function RingAnimation({ active }) {
  return (
    <div style={{position:'relative', width:40, height:40}}>

        position:'absolute', inset:0, borderRadius:'50%',
        background:'#b8502a', display:'grid', placeItems:'center',
        color:'#fbf9f2', fontSize:18,
        animation: active ? 'phoneShake 0.6s ease infinite' : 'none',
      }}>☏</div>
      {active && [0,1].map(i => (
        <div key={i} style={{
          position:'absolute', inset:0, borderRadius:'50%',
          border:'2px solid #b8502a',
          animation:`phonePing 1.4s ease-out ${i * 0.7}s infinite`,
        }}/>
      ))}
      <style>{`
        @keyframes phoneShake {
          0%, 100% { transform: rotate(0); }
          25% { transform: rotate(-10deg); }
          75% { transform: rotate(10deg); }
        }
        @keyframes phonePing {
          0% { transform: scale(1); opacity: 1; }
          100% { transform: scale(2.2); opacity: 0; }
        }
      `}</style>
    </div>
  );
}

function LiveWave({ active }) {
  const [t, setT] = React.useState(0);
  React.useEffect(() => {
    if (!active) return;
    const id = setInterval(() => setT(x => x + 1), 90);
    return () => clearInterval(id);
  }, [active]);
  const bars = 56;
  return (
    <div style={{display:'flex', alignItems:'center', gap:3, height:36}}>
      {[...Array(bars)].map((_, i) => {
        const phase = t * 0.4 + i * 0.3;
        const base = Math.sin(phase) * 0.5 + 0.5;
        const h = active ? 4 + Math.pow(base, 1.8) * 28 : 3;
        return (
          <div key={i} style={{
            width:3, height:h,
            background: i < bars / 2 ? '#b8502a' : '#c9a961',
            opacity: active ? 0.4 + base * 0.6 : 0.2,
            transition:'height 0.18s ease-out',
          }}/>
        );
      })}
    </div>
  );
}

/* Reusable pixel portrait — smaller/simpler than the Semperr landing version */
function MiniPortrait({ e, small, large, hovered }) {
  const CELL = small ? 3 : large ? 6 : 5;
  const GRID = 18;
  const grid = React.useMemo(() => makeTinyPortrait(GRID), [e.name]);
  const colors = {
    hair: e.hair, skin: e.skin, shirt: e.shirt,
    eye:'#1e1410', mouth:'#8a3a1f', shadow:'#c99874',
  };

  return (
    <div style={{
      position:'relative',
      width: GRID * CELL + 12, height: GRID * CELL + 12,
      display:'flex', alignItems:'center', justifyContent:'center',
    }}>
      <div style={{
        position:'absolute', inset:0,
        background:`radial-gradient(circle at 50% 60%, ${e.shirt}22, transparent 65%)`,
        filter:'blur(4px)',
      }}/>
      <svg width={GRID * CELL} height={GRID * CELL} style={{position:'relative'}}>
        {grid.map((row, y) => row.map((cell, x) => {
          if (!cell) return null;
          return (
            <rect key={`${x}-${y}`}
              x={x * CELL} y={y * CELL}
              width={CELL + 0.4} height={CELL + 0.4}
              fill={colors[cell] || colors.skin}/>
          );
        }))}
      </svg>
    </div>
  );
}

function makeTinyPortrait(GRID) {
  const raw = [
    '..................',
    '..................',
    '.......hhhhh......',
    '.....hhhhhhhhh....',
    '....hhsssssshh....',
    '....hssssssssh....',
    '....hsssssssss....',
    '....hssdssdsss....',
    '....hseeeseess....',
    '....hssssssss.....',
    '.....hsssssss.....',
    '.....hsscccss.....',
    '.....hssmmmss.....',
    '......hsssss......',
    '......sssss.......',
    '.....tttttttt.....',
    '....tttttttttt....',
    '...tttttttttttt...',
  ];
  const map = {'.':null, 's':'skin', 'h':'hair', 't':'shirt', 'e':'eye', 'm':'mouth', 'c':'cheek', 'd':'shadow'};
  return raw.map(r => r.split('').map(ch => map[ch]));
}

  const mark = yes ? '✓' : no ? '–' : v;

  if (yes || no) {
    return (
      <div style={{
        display:'inline-grid', placeItems:'center',
        width: yes ? 28 : 20, height: yes ? 28 : 20,
        background: yes ? (highlight ? '#c9a961' : color + '22') : 'transparent',
        color: yes ? (highlight ? '#0b1220' : color) : color,
        fontSize: yes ? 16 : 20, lineHeight:1,
        fontWeight:500,
        borderRadius: yes ? '50%' : 0,
      }}>{mark}</div>
    );
  }
  return <span style={{fontSize:12, color, fontFamily:'JetBrains Mono, monospace'}}>{v}</span>;

/* ===== dev-components/DevTweaks.jsx ===== */
function DevTweaks({ state, setState, visible }) {
  if (!visible) return null;
  const set = (k, v) => {
    setState(s => ({...s, [k]: v}));
    window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]: v}}, '*');
  };
  const Row = ({label, children}) => (
    <div style={{display:'grid', gridTemplateColumns:'92px 1fr', gap:12, alignItems:'center', padding:'10px 0', borderBottom:'1px solid rgba(11,18,32,0.06)'}}>
      <div style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, letterSpacing:'0.08em', textTransform:'uppercase', color:'#6b7388'}}>{label}</div>
      <div>{children}</div>
    </div>
  );
  const Seg = ({value, onChange, opts}) => (
    <div style={{display:'flex', gap:4, flexWrap:'wrap'}}>
      {opts.map(o => (
        <button key={o.v} onClick={() => onChange(o.v)} style={{
          padding:'6px 10px', fontSize:11,
          border:`1px solid ${value === o.v ? '#0b1220' : 'rgba(11,18,32,0.15)'}`,
          background: value === o.v ? '#0b1220' : '#fff',
          color: value === o.v ? '#f8f6f0' : '#0b1220',
          fontFamily:'JetBrains Mono, monospace', letterSpacing:'0.04em', borderRadius:2, cursor:'pointer',
        }}>{o.l}</button>
      ))}
    </div>
  );
  return (
    <div style={{position:'fixed', bottom:20, right:20, zIndex:100, width:320,
      background:'#f8f6f0', border:'1px solid rgba(11,18,32,0.15)',
      boxShadow:'0 30px 60px -20px rgba(0,0,0,0.3)', borderRadius:4, overflow:'hidden',
      fontFamily:'Inter Tight, sans-serif'}}>
      <div style={{padding:'14px 16px', borderBottom:'1px solid rgba(11,18,32,0.1)', background:'#0b1220', color:'#f8f6f0', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <span style={{fontFamily:'Instrument Serif, serif', fontSize:20}}>Tweaks</span>
        <span style={{fontFamily:'JetBrains Mono, monospace', fontSize:10, color:'#b8502a', letterSpacing:'0.1em'}}>DEV</span>
      </div>
      <div style={{padding:'8px 16px 16px'}}>
        <Row label="Theme"><Seg value={state.theme} onChange={v => set('theme', v)} opts={[{v:'paper',l:'Paper'},{v:'ink',l:'Ink'}]}/></Row>
        <Row label="Hero"><Seg value={state.heroVariant} onChange={v => set('heroVariant', v)} opts={[{v:'swarm',l:'Swarm'},{v:'calls',l:'Calls'},{v:'terminal',l:'Term'}]}/></Row>
        <Row label="Service"><Seg value={state.cardStyle} onChange={v => set('cardStyle', v)} opts={[{v:'editorial',l:'Editorial'},{v:'ink',l:'Ink'}]}/></Row>
        <Row label="Engineers"><Seg value={state.engineerLayout} onChange={v => set('engineerLayout', v)} opts={[{v:'grid',l:'Grid'},{v:'roster',l:'Roster'},{v:'list',l:'List'}]}/></Row>
        <Row label="Pricing"><Seg value={state.pricing ? 'on' : 'off'} onChange={v => set('pricing', v === 'on')} opts={[{v:'off',l:'Hidden'},{v:'on',l:'Shown'}]}/></Row>
      </div>
    </div>
  );
}
window.DevTweaks = DevTweaks;


</script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "paper",
  "heroVariant": "swarm",
  "cardStyle": "ink",
  "engineerLayout": "grid",
  "pricing": false
}/*EDITMODE-END*/;

function DevApp(){
  const [state,setState] = React.useState(TWEAK_DEFAULTS);
  const [tweaksOn,setTweaksOn] = React.useState(false);
  React.useEffect(()=>{
    const h=(e)=>{
      if(e.data?.type==='__activate_edit_mode') setTweaksOn(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',h);
  },[]);
  return (
    <div data-screen-label="Dev Product Page">
      <DevMasthead/>
      <DevHero variant={state.heroVariant}/>
      <DevPromise/>
      <DevServices cardStyle={state.cardStyle}/>
      <DevCart/>
      <DevReceptionist/>
      <DevEngineers layout={state.engineerLayout}/>
      <DevTestimonials/>
      <DevCompare/>
      <DevCases/>
      <DevOutro/>
      <DevTweaks state={state} setState={setState} visible={tweaksOn}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<DevApp/>);
</script>
